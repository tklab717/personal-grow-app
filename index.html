<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GROW">
<meta name="theme-color" content="#f4f6fb">
<title>GROW &#10022; &#25104;&#38263;&#12503;&#12521;&#12531;&#12490;&#12540;</title>
<style>
  :root{
    --bg:#f4f6fb; --surface:#ffffff; --card:#ffffff; --border:#e6e9f2;
    --accent:#6c5ce7; --accentGlow:rgba(108,92,231,.18);
    --gold:#f0a500; --green:#16c79a; --red:#ff5d73; --cyan:#0bbbd6;
    --text:#1c2238; --muted:#8a90a6;
    --grid:#eceff7; --gridStrong:#dfe3ee;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;
    background:linear-gradient(180deg,#eef1fb 0%,#f4f6fb 30%) fixed,var(--bg);color:var(--text);
    font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior:none;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-top:env(safe-area-inset-top);}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  .header{padding:18px 20px 4px;display:flex;justify-content:space-between;align-items:center;}
  .logo{font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-.5px;}
  .date{font-size:11px;color:var(--muted);}
  .content{padding:16px 16px 120px;}
  .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;
    box-shadow:0 6px 20px rgba(28,34,56,.06);}
  .btn{background:linear-gradient(135deg,#6c5ce7,#8e7bff);color:#fff;border:none;
    border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;box-shadow:0 6px 18px var(--accentGlow);}
  .btn:active{transform:scale(.97);}
  .input{width:100%;background:#f7f8fc;border:1px solid var(--border);border-radius:10px;
    padding:11px 12px;color:var(--text);font-size:14px;outline:none;}
  .input:focus{border-color:var(--accent);background:#fff;}
  textarea.input{resize:vertical;min-height:90px;line-height:1.6;}
  .ring-wrap{position:relative;width:110px;height:110px;margin:0 auto;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
  @keyframes rot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .ring-outer{position:absolute;inset:0;border-radius:50%;border:3px solid var(--accent);
    box-shadow:0 0 20px var(--accentGlow);animation:pulse 2s ease-in-out infinite;}
  .ring-mid{position:absolute;inset:8px;border-radius:50%;animation:rot 8s linear infinite;opacity:.4;}
  .ring-core{position:absolute;inset:12px;border-radius:50%;background:var(--surface);
    display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-num{font-size:28px;font-weight:900;color:var(--gold);line-height:1;}
  .ring-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
  .stat-row{margin-top:14px;display:flex;justify-content:center;gap:28px;}
  .stat-num{font-size:22px;font-weight:800;}
  .stat-lbl{font-size:10px;color:var(--muted);}
  .seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;gap:3px;}
  .seg button{flex:1;border:none;background:none;color:var(--muted);font-size:12px;font-weight:600;padding:7px 0;border-radius:8px;}
  .seg button.on{background:var(--accent);color:#fff;}
  /* vertical timeline gantt */
  /* ── vertical gantt (refined) ── */
  .g-seg-wrap{margin-bottom:14px;}
  .g-card{padding:16px 10px 18px;overflow:hidden;}
  .v-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
  .v-scroll::-webkit-scrollbar{height:5px;}
  .v-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .v-inner{position:relative;}
  .v-grid{position:relative;}
  .v-axis{position:absolute;left:0;top:0;z-index:1;}
  .v-tick{position:absolute;left:0;transform:translateY(-50%);color:var(--muted);}
  .v-tick.mon{display:flex;align-items:baseline;gap:1px;font-weight:800;color:var(--ink);}
  .v-mnum{font-size:15px;letter-spacing:-.5px;}
  .v-msuf{font-size:9px;color:var(--muted);font-weight:600;}
  .v-tick.wk{font-size:10px;color:#aeb4c6;font-weight:600;}
  .v-tick.day{font-size:9px;color:#bcc1d0;font-weight:600;}
  .v-hline{position:absolute;left:48px;right:0;height:1px;background:var(--grid);z-index:0;}
  .v-hline.strong{background:var(--gridStrong);}
  .v-today{position:absolute;left:48px;right:0;height:2px;
    background:linear-gradient(90deg,var(--gold),rgba(240,165,0,.3));border-radius:2px;z-index:5;}
  .v-today-tag{position:absolute;left:0;top:-9px;font-size:9px;font-weight:800;color:#fff;
    background:var(--gold);padding:2px 7px;border-radius:10px;box-shadow:0 2px 6px rgba(240,165,0,.4);white-space:nowrap;z-index:6;}
  .v-bar{position:absolute;border-radius:10px;z-index:2;padding:7px 5px 5px;overflow:hidden;cursor:pointer;
    box-shadow:0 4px 12px -2px rgba(28,36,51,.22),inset 0 1px 0 rgba(255,255,255,.25);
    box-shadow:0 4px 14px -2px color-mix(in srgb,var(--c) 55%,transparent),inset 0 1px 0 rgba(255,255,255,.25);
    transition:transform .12s ease,box-shadow .12s ease;
    display:flex;flex-direction:column;align-items:center;}
  .v-bar:active{transform:scale(.97);}
  .v-bar-emoji{font-size:13px;line-height:1;margin-bottom:3px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.15));}
  .v-bar-tx{font-size:10px;font-weight:700;color:#fff;line-height:1.3;text-align:center;
    display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;
    text-shadow:0 1px 2px rgba(0,0,0,.2);}
  .v-bar-dur{margin-top:auto;font-size:8.5px;font-weight:700;color:rgba(255,255,255,.85);
    background:rgba(255,255,255,.18);padding:1px 6px;border-radius:8px;}
  /* legend */
  .g-legend{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
  .g-leg{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--muted);
    background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:5px 12px;
    box-shadow:0 1px 4px rgba(28,36,51,.04);}
  .g-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .g-dot.today{background:var(--gold);width:14px;height:4px;border-radius:3px;}
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:var(--surface);border-top:1px solid var(--border);display:flex;
    padding:8px 0 calc(18px + env(safe-area-inset-bottom));z-index:50;}
  .tab{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10px;}
  .tab.on{color:var(--accent);font-weight:700;}
  .tab .ic{font-size:20px;}
  .fab{position:fixed;bottom:calc(78px + env(safe-area-inset-bottom));right:max(16px,calc(50% - 224px));
    width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#5a3fd8);
    border:none;font-size:28px;color:#fff;box-shadow:0 4px 24px var(--accentGlow);
    display:flex;align-items:center;justify-content:center;z-index:60;}
  .fab:active{transform:scale(.92);}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
  .sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px calc(36px + env(safe-area-inset-bottom));
    width:100%;max-width:480px;border:1px solid var(--border);animation:up .25s ease;max-height:88vh;overflow-y:auto;}
  @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .dom-pick{flex:1;padding:8px 4px;border-radius:10px;border:2px solid var(--border);background:var(--bg);
    color:var(--text);font-size:18px;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .dom-pick .nm{font-size:9px;color:var(--muted);}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:28px 16px;line-height:1.7;}
  .todo-row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);}
  .todo-row:last-child{border-bottom:none;}
  .todo-check{flex:0 0 26px;width:26px;height:26px;border-radius:50%;border:2px solid var(--c,#ccc);
    background:#fff;color:#fff;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;line-height:1;}
  .todo-check.on{background:var(--c,#16c79a);border-color:var(--c,#16c79a);box-shadow:0 2px 8px -1px var(--c,#16c79a);}
  .todo-check:active{transform:scale(.88);}
  .todo-main{flex:1;min-width:0;}
  .todo-title{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .todo-sub{font-size:10.5px;color:var(--muted);margin-top:1px;}
  .todo-row.done .todo-title{color:var(--muted);text-decoration:line-through;}
  .freq-segwrap{display:flex;gap:6px;}
  .freq-seg{flex:1;padding:9px 0;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:12.5px;font-weight:700;cursor:pointer;}
  .freq-seg.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .freq-num{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--ink);font-size:13px;font-weight:700;cursor:pointer;padding:0;}
  .freq-num.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .freq-wd{flex:1;height:34px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--ink);font-size:12.5px;font-weight:700;cursor:pointer;padding:0;}
  .freq-wd.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;
    background:var(--surface);border:1px solid var(--border);color:var(--muted);}
  .tagchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
    padding:6px 12px;border-radius:20px;background:#fff;border:1.5px solid var(--border);
    cursor:pointer;transition:all .12s;}
  .tagchip:active{transform:scale(.95);}
  .tagchip.on{box-shadow:0 2px 8px rgba(0,0,0,.12);}
  .diary-card{padding:14px;}
  .diary-date{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:6px;}
  .diary-text{font-size:13px;line-height:1.7;white-space:pre-wrap;}
  .row-tap{cursor:pointer;}
  /* cloud sync */
  .sync-row{display:flex;gap:9px;align-items:center;}
  .sync-btn{flex:1;border:none;border-radius:11px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
  .sync-btn.primary{background:linear-gradient(135deg,#4285f4,#3a6ea8);color:#fff;}
  .sync-btn.ghost{background:#fff;border:1.5px solid var(--border);color:var(--ink);}
  .sync-btn:active{transform:scale(.97);}
  .sync-status{font-size:11px;color:var(--muted);margin-top:8px;text-align:center;line-height:1.6;}
  .sync-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
  .sync-toggle-lbl{font-size:13px;font-weight:700;color:var(--ink);}
  .sync-toggle{position:relative;width:46px;height:26px;border-radius:14px;border:none;background:var(--border);cursor:pointer;transition:background .2s;padding:0;}
  .sync-toggle.on{background:linear-gradient(135deg,#4285f4,#3a6ea8);}
  .sync-toggle .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:left .2s;}
  .sync-toggle.on .knob{left:23px;}
</style>

<body>
<div id="app"></div>
<script>
/* =====================================================================
 * recall-store.js  v2  —  GROW 想起カード台帳レイヤー（同期対応・差し込み式）
 * ---------------------------------------------------------------------
 * v2の肝（「きっちり」版）:
 *   進捗を「状態」でなく「想起イベントのログ」で持つ。
 *     event = { id:"端末:連番", at: ISO時刻, grade: 2..5 }
 *   ・マージ = イベント集合の和（union）。可換・冪等・結合的、後退しない。
 *   ・活動量の合計（のべ想起回数）= イベント数の和 → 別端末ぶんも正しく増える。
 *   ・スケジュール(reps/間隔/次回) = ログを時刻順に再生して導出。
 *       同じ日の複数回は1段に畳む（はしごを上げ過ぎない）。
 *       次回出題日は「その想起を行った日」を基準に計算（後追い同期でもズレない）。
 *   コンテンツ（問い・答え）は contentAt の新しい方（作り直せる側）。
 *   削除は tombstone。削除より後の想起があれば復活。
 *   id は再計算しない。スキルが付けた id をそのままキーに使う。
 *
 * 保存2層: local（端末・常時） + remote（Drive 等・sync時）。アダプタで差し込む。
 * ===================================================================== */
(function (root, factory) {
  if (typeof module === 'object' && module.exports) module.exports = factory();
  else root.RecallStoreLib = factory();
}(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  /* ---------- 時刻・日付 ---------- */
  const pad2 = n => String(n).padStart(2, '0');
  const localDateStr = d => d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  const nowISO = () => new Date().toISOString();
  const today = () => localDateStr(new Date());
  const dayOf = iso => localDateStr(new Date(iso));
  const addDays = (s, n) => { const p = s.split('-').map(Number); const x = new Date(p[0], p[1] - 1, p[2]); x.setDate(x.getDate() + n); return localDateStr(x); };
  const ts = s => (s ? Date.parse(s) : 0);
  const emptyStore = () => ({ format: 'grow-recall-store', version: 2, cards: {} });
  const clone = o => JSON.parse(JSON.stringify(o));

  /* ---------- 契約（スキル出力）の検証 ---------- */
  const TYPES = new Set(['free_recall', 'cued', 'cloze']);
  const FORBIDDEN = ['due', 'next', 'nextDue', 'interval', 'ease', 'ef', 'reps', 'lapses', 'stability', 'difficulty', 'srs', 'schedule', 'history', 'events'];
  function validateImport(obj) {
    const e = [];
    if (!obj || typeof obj !== 'object') return ['JSONオブジェクトではありません'];
    if (obj.format !== 'grow-recall-cards') e.push('format が "grow-recall-cards" ではありません');
    if (obj.version !== 1) e.push('version が 1 ではありません');
    if (!obj.source || typeof obj.source !== 'string') e.push('source（出典）が空です');
    if (!Array.isArray(obj.cards) || obj.cards.length === 0) { e.push('cards が空です'); return e; }
    obj.cards.forEach((c, i) => {
      const t = '#' + (i + 1) + ': ';
      if (!/^[0-9a-f]{8}$/.test(c.id || '')) e.push(t + 'id が8桁16進ではありません');
      if (!TYPES.has(c.type)) e.push(t + 'type が不正');
      if (!Array.isArray(c.tags) || c.tags.filter(x => String(x).trim()).length === 0) e.push(t + 'tags が空');
      if (!c.prompt || !String(c.prompt).trim()) e.push(t + 'prompt が空');
      if (!c.answer || !String(c.answer).trim()) e.push(t + 'answer が空');
      const bad = FORBIDDEN.filter(k => k in c);
      if (bad.length) e.push(t + '禁止フィールド: ' + bad.join(','));
    });
    return e;
  }

  /* ---------- SM-2 を1段進める（純粋） ---------- */
  function sm2step(s, q, dayISO) {           // q: 2=もう一度 3=難 4=普通 5=易
    if (q < 3) { s.reps = 0; s.intervalDays = 1; s.lapses++; }
    else {
      if (s.reps === 0) s.intervalDays = 1;
      else if (s.reps === 1) s.intervalDays = 6;
      else s.intervalDays = Math.round(s.intervalDays * s.ef);
      s.reps++;
    }
    s.ef = Math.max(1.3, s.ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
    s.due = addDays(dayISO, s.intervalDays);
    s.lastGrade = q;
  }

  /* ---------- イベントログ → スケジュール導出（純粋） ---------- */
  // 時刻順に並べ、同じ日は最後の評価1回に畳んで SM-2 を再生する。
  function deriveSrs(events) {
    const base = { reps: 0, lapses: 0, ef: 2.5, intervalDays: 0, due: today(), reviewedAt: null, lastGrade: null };
    if (!events || !events.length) return base;
    const sorted = events.slice().sort((a, b) => (a.at < b.at ? -1 : a.at > b.at ? 1 : (a.id < b.id ? -1 : 1)));
    const lastPerDay = []; let curDay = null;
    for (const ev of sorted) {
      const d = dayOf(ev.at);
      if (d === curDay) lastPerDay[lastPerDay.length - 1] = ev;
      else { lastPerDay.push(ev); curDay = d; }
    }
    for (const ev of lastPerDay) sm2step(base, ev.grade, dayOf(ev.at));
    base.reviewedAt = sorted[sorted.length - 1].at;
    return base;
  }

  /* ---------- カードの正規化 ---------- */
  function normalize(c) {
    if (!c) return c;
    if (c.deletedAt && !c.events) return { id: c.id, deletedAt: c.deletedAt };
    c.events = Array.isArray(c.events) ? c.events : [];
    c.srs = deriveSrs(c.events);
    return c;
  }
  const contentOf = c => ({ id: c.id, type: c.type, tags: c.tags, prompt: c.prompt, answer: c.answer, hint: c.hint || '', note: c.note || '', source: c.source || '', contentAt: c.contentAt || null });
  const stableKey = c => JSON.stringify([c.answer, c.prompt, c.contentAt]);

  /* ---------- マージの心臓部 ---------- */
  function unionEvents(ea, eb) {
    const m = new Map();
    (ea || []).forEach(e => m.set(e.id, e));
    (eb || []).forEach(e => m.set(e.id, e));   // 同一 id は1つ（冪等・二重計上なし）
    return [...m.values()];
  }
  function mergeCard(a, b) {
    if (!a) return normalize(clone(b));
    if (!b) return normalize(clone(a));
    const ca = ts(a.contentAt), cb = ts(b.contentAt);
    let content = cb > ca ? contentOf(b) : ca > cb ? contentOf(a) : (stableKey(b) > stableKey(a) ? contentOf(b) : contentOf(a));
    const events = unionEvents(a.events, b.events);
    const srs = deriveSrs(events);
    const aliveStamp = Math.max(ts(content.contentAt), srs.reviewedAt ? ts(srs.reviewedAt) : 0);
    const delStamp = Math.max(ts(a.deletedAt), ts(b.deletedAt));
    if (delStamp > 0 && delStamp >= aliveStamp) return { id: content.id, deletedAt: new Date(delStamp).toISOString() };
    return Object.assign(content, { deletedAt: null, events, srs });
  }
  function mergeStores(A, B) {
    const a = (A && A.cards) || {}, b = (B && B.cards) || {};
    const out = emptyStore();
    new Set([...Object.keys(a), ...Object.keys(b)]).forEach(id => { out.cards[id] = mergeCard(a[id], b[id]); });
    return out;
  }

  /* ---------- アダプタ（差し込み式 I/O） ---------- */
  class MemoryAdapter {
    constructor(initial) { this._s = initial ? clone(initial) : null; }
    async load() { return this._s ? clone(this._s) : null; }
    async save(s) { this._s = clone(s); }
  }
  class LocalStorageAdapter {
    constructor(key) { this.key = key; }
    async load() { try { const r = localStorage.getItem(this.key); return r ? JSON.parse(r) : null; } catch (e) { return null; } }
    async save(s) { localStorage.setItem(this.key, JSON.stringify(s)); }
  }
  class DriveAppDataAdapter {
    constructor({ getToken, filename = 'grow_recall_cards.json' }) { this.getToken = getToken; this.filename = filename; this._fileId = null; }
    async _headers() { return { Authorization: 'Bearer ' + (await this.getToken()) }; }
    async _find() {
      if (this._fileId) return this._fileId;
      const q = encodeURIComponent(`name='${this.filename}'`);
      const r = await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=${q}&fields=files(id,name)`, { headers: await this._headers() });
      if (!r.ok) throw new Error('Drive list失敗: ' + r.status);
      const j = await r.json(); this._fileId = (j.files && j.files[0] && j.files[0].id) || null; return this._fileId;
    }
    async load() {
      const id = await this._find(); if (!id) return null;
      const r = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`, { headers: await this._headers() });
      if (!r.ok) throw new Error('Drive get失敗: ' + r.status); return await r.json();
    }
    async save(store) {
      const id = await this._find();
      const meta = { name: this.filename, parents: id ? undefined : ['appDataFolder'] };
      const boundary = 'grow' + Math.random().toString(36).slice(2);
      const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n` +
        `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(store)}\r\n--${boundary}--`;
      const url = id ? `https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=multipart`
                     : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
      const r = await fetch(url, { method: id ? 'PATCH' : 'POST', headers: Object.assign(await this._headers(), { 'Content-Type': `multipart/related; boundary=${boundary}` }), body });
      if (!r.ok) throw new Error('Drive save失敗: ' + r.status);
      const j = await r.json(); if (j.id) this._fileId = j.id;
    }
  }

  /* ---------- 台帳本体 ---------- */
  function rid() { return Math.random().toString(36).slice(2, 8); }
  class RecallStore {
    constructor({ local, remote, deviceId } = {}) {
      this.local = local || new MemoryAdapter();
      this.remote = remote || null;
      this.deviceId = deviceId || null;
      this.data = emptyStore();
      this.seq = 0;
    }
    async init() {
      const s = await this.local.load();
      if (s && s.cards) { this.data = { format: 'grow-recall-store', version: 2, cards: s.cards }; this.seq = s.seq || 0; this.deviceId = this.deviceId || s.deviceId || null; }
      this.deviceId = this.deviceId || ('dev-' + rid());
      Object.values(this.data.cards).forEach(normalize);
      return this;
    }
    _localBlob() { return { format: 'grow-recall-store', version: 2, deviceId: this.deviceId, seq: this.seq, cards: this.data.cards }; }
    async _persist() { await this.local.save(this._localBlob()); }

    /* 取り込み（マージ）: スキル契約JSON → 台帳。進捗(events)は保持。 */
    import(contractJson) {
      const errs = validateImport(contractJson);
      if (errs.length) return { ok: false, errors: errs };
      const incoming = emptyStore(); const stamp = nowISO();
      contractJson.cards.forEach(c => {
        incoming.cards[c.id] = { id: c.id, type: c.type, tags: c.tags.slice(), prompt: c.prompt, answer: c.answer, hint: c.hint || '', note: c.note || '', source: contractJson.source, contentAt: stamp, deletedAt: null, events: [] };
      });
      let nNew = 0, nUpd = 0;
      Object.keys(incoming.cards).forEach(id => { this.data.cards[id] && !this.data.cards[id].deletedAt ? nUpd++ : nNew++; });
      this.data = mergeStores(this.data, incoming);
      this._persist();
      return { ok: true, added: nNew, updated: nUpd, total: this.count() };
    }

    /* 参照系 */
    live() { return Object.values(this.data.cards).filter(c => !c.deletedAt); }
    count() { return this.live().length; }
    get(id) { const c = this.data.cards[id]; return c && !c.deletedAt ? c : null; }
    dueToday() { return this.live().filter(c => c.srs.due <= today()).sort((a, b) => a.srs.due < b.srs.due ? -1 : 1); }
    coverage() { const m = {}; this.live().forEach(c => c.tags.forEach(t => { m[t] = (m[t] || 0) + 1; })); return m; }
    matured(days = 21) { return this.live().filter(c => c.srs.intervalDays >= days).length; }
    totalReviews() { return this.live().reduce((n, c) => n + (c.events ? c.events.length : 0), 0); }
    reviewsOf(id) { const c = this.get(id); return c && c.events ? c.events.length : 0; }
    activityByDevice() { const m = {}; this.live().forEach(c => (c.events || []).forEach(e => { const d = e.id.split(':')[0]; m[d] = (m[d] || 0) + 1; })); return m; }

    /* 採点: イベントを1件追記し、スケジュールを再導出 */
    review(id, q) {
      const c = this.data.cards[id];
      if (!c || c.deletedAt) return null;
      c.events = c.events || [];
      this.seq += 1;
      c.events.push({ id: this.deviceId + ':' + this.seq, at: nowISO(), grade: q });
      c.srs = deriveSrs(c.events);
      this._persist();
      return c.srs;
    }

    /* 削除（tombstone） */
    delete(id) { const c = this.data.cards[id]; if (!c) return false; this.data.cards[id] = { id, deletedAt: nowISO() }; this._persist(); return true; }

    /* 同期: remote を引き、カード単位でマージし、両方へ書き戻す */
    async sync() {
      if (!this.remote) throw new Error('remote アダプタが未設定です');
      const remote = (await this.remote.load()) || emptyStore();
      this.data = mergeStores(this.data, remote);
      await this.remote.save({ format: 'grow-recall-store', version: 2, cards: this.data.cards });
      await this._persist();
      return { ok: true, total: this.count(), totalReviews: this.totalReviews() };
    }
  }

  return {
    RecallStore, mergeStores, mergeCard, deriveSrs, sm2step, validateImport,
    MemoryAdapter, LocalStorageAdapter, DriveAppDataAdapter,
    _util: { today, addDays, nowISO, dayOf, emptyStore }
  };
}));

<script>
(function(){

  recallStore.init();

  function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch(e){return d}}
  function save(){localStorage.setItem(TKEY,JSON.stringify(tasks));localStorage.setItem(DKEY,JSON.stringify(diary));localStorage.setItem(GKEY,JSON.stringify(goals));scheduleAutoSave();}
  var GROW_VERSION = "2026.06.25a"; // タイムゾーン修正
  function today(){return new Date().toISOString().slice(0,10);}
  function addDays(iso,n){var d=new Date(iso);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
  function dayDiff(a,b){return Math.round((new Date(b)-new Date(a))/864e5);}
  function fmt(iso){return new Date(iso).toLocaleDateString("ja-JP",{month:"short",day:"numeric"});}
  function fmtFull(iso){return new Date(iso).toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"});}
  function dom(id){for(var i=0;i<DOMAINS.length;i++)if(DOMAINS[i].id===id)return DOMAINS[i];return DOMAINS[0];}
  function esc(s){return(s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function rangeDays(){return range==="1m"?30:range==="3m"?90:365;}

  // ── 頻度・完了ヘルパー ──
  var WD=["\u65e5","\u6708","\u706b","\u6c34","\u6728","\u91d1","\u571f"]; // 0=日
  function taskFreq(t){return t.freq||{type:"daily",times:3,days:[]};}
  function weekStartISO(iso){var d=new Date(iso||today());d.setDate(d.getDate()-d.getDay());return d.toISOString().slice(0,10);}
  function doneOn(t,date){return (t.done||[]).indexOf(date)>=0;}
  // その日にタスクが「対象」か（期間内＋頻度一致）
  function isDue(t,date){
    date=date||today();
    if(date<t.start||date>t.end)return false;
    var f=taskFreq(t);
    if(f.type==="daily")return true;
    if(f.type==="weekly")return true;   // 週N回は曜日自由、毎日「候補」に出す
    if(f.type==="days"){var wd=new Date(date).getDay();return (f.days||[]).indexOf(wd)>=0;}
    return true;
  }
  // 週N回タスクの今週の達成数
  function weeklyDoneCount(t,date){
    var ws=weekStartISO(date);var we=addDays(ws,6);
    return (t.done||[]).filter(function(d){return d>=ws&&d<=we;}).length;
  }
  // その日に「まだやるべき」か（週N回は達成済みなら出さない）
  function isTodo(t,date){
    date=date||today();
    if(!isDue(t,date))return false;
    if(doneOn(t,date))return true; // 完了済みも表示（チェック状態で）
    var f=taskFreq(t);
    if(f.type==="weekly"){ return weeklyDoneCount(t,date) < (f.times||1); }
    return true;
  }
  function freqLabel(t){
    var f=taskFreq(t);
    if(f.type==="daily")return "\u6bce\u65e5";
    if(f.type==="weekly")return "\u9031"+(f.times||1)+"\u56de";
    if(f.type==="days"){var ds=(f.days||[]).slice().sort();return ds.map(function(w){return WD[w];}).join("\u30fb")||"\u66dc\u65e5\u672a\u8a2d\u5b9a";}
    return "";
  }
  function toggleDone(id,date){
    date=date||today();
    var t=tasks.filter(function(x){return x.id===id;})[0];if(!t)return;
    if(!t.done)t.done=[];
    var i=t.done.indexOf(date);
    if(i>=0)t.done.splice(i,1);else t.done.push(date);
    save();render();
  }

  function diaryStreak(){
    if(!diary.length)return 0;
    var seen={},ds=[];diary.forEach(function(e){if(!seen[e.date]){seen[e.date]=1;ds.push(e.date);}});
    ds.sort().reverse();
    var st=0,cur=new Date(today());
    for(var i=0;i<ds.length;i++){var diff=Math.round((cur-new Date(ds[i]))/864e5);
      if(diff===0||diff===1){st++;cur=new Date(ds[i]);}else break;}
    return st;
  }

  function home(){
    var st=diaryStreak();
    var activeTasks=tasks.filter(function(t){return t.end>=today();}).length;
    var totalDiary=diary.length;
    var up=tasks.filter(function(t){return t.end>=today();}).sort(function(a,b){return a.start.localeCompare(b.start);}).slice(0,4);
    var upHtml=up.length?up.map(function(t){var d=dom(t.domain);var ongoing=t.start<=today();
      return'<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">'+
        '<span style="width:8px;height:8px;border-radius:50%;background:'+d.color+';flex:0 0 auto"></span>'+
        '<div style="flex:1;min-width:0"><div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</div>'+
        '<div style="font-size:10px;color:var(--muted)">'+fmt(t.start)+' \u2192 '+fmt(t.end)+'</div></div>'+
        '<span class="chip" style="'+(ongoing?'color:'+d.color+';border-color:'+d.color+'66':'')+'">'+(ongoing?"\u9032\u884c\u4e2d":"\u4e88\u5b9a")+'</span></div>';}).join("")
      :'<div class="empty">\u300c\u8a08\u753b\u300d\u30bf\u30d6\u3067\u53d6\u308a\u7d44\u307f\u9805\u76ee\u3092\u8ffd\u52a0\u3059\u308b\u3068\u3001\u3053\u3053\u306b\u8868\u793a\u3055\u308c\u307e\u3059</div>';
    var dstats=DOMAINS.map(function(d){return{d:d,n:tasks.filter(function(t){return t.domain===d.id&&t.end>=today();}).length};});
    var maxN=Math.max.apply(null,dstats.map(function(x){return x.n;}).concat([1]));
    var bal=dstats.map(function(x){return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">'+
      '<span style="font-size:16px">'+x.d.emoji+'</span>'+
      '<span style="width:36px;font-size:11px;color:var(--muted)">'+x.d.label+'</span>'+
      '<div style="flex:1;background:var(--border);border-radius:4px;height:6px;overflow:hidden">'+
      '<div style="width:'+Math.round(x.n/maxN*100)+'%;height:100%;background:'+x.d.color+';border-radius:4px"></div></div>'+
      '<span style="font-size:11px;color:var(--muted);width:20px;text-align:right">'+x.n+'</span></div>';}).join("");
    return '<div class="card" style="text-align:center;padding:22px 16px">'+
        '<div class="label">\u65e5\u8a18\u306e\u7d99\u7d9a</div>'+
        '<div class="ring-wrap"><div class="ring-outer"></div>'+
          '<div class="ring-mid" style="background:conic-gradient(var(--gold) '+Math.min(st*10,100)+'%,var(--card) 0)"></div>'+
          '<div class="ring-core"><div class="ring-num">'+st+'</div><div class="ring-lbl">\u65e5\u9023\u7d9a</div></div></div>'+
        '<div class="stat-row">'+
          '<div><div class="stat-num" style="color:var(--accent)">'+activeTasks+'</div><div class="stat-lbl">\u9032\u884c\u4e2d\u306e\u9805\u76ee</div></div>'+

      todayCard()+

      '<div class="card"><div class="label">\u9818\u57df\u30d0\u30e9\u30f3\u30b9\uff08\u9032\u884c\u4e2d\uff09</div>'+bal+'</div>'+
      '<div class="card"><div class="label">\u2601\uFE0F \u30af\u30e9\u30a6\u30c9\u540c\u671f</div><div id="syncBox">'+syncInner()+'</div></div>';
  }

  // 今日取り組むことカード（完了チェック付き）
  function todayCard(){
    var td=today();
    var todos=tasks.filter(function(t){return isTodo(t,td);});
    // 完了を下に、未完了を上にソート
    todos.sort(function(a,b){var ad=doneOn(a,td)?1:0,bd=doneOn(b,td)?1:0;return ad-bd;});
    var doneN=todos.filter(function(t){return doneOn(t,td);}).length;
    var inner;
    if(!todos.length){
      inner='<div class="empty" style="padding:18px 8px">\u4eca\u65e5\u5bfe\u8c61\u306e\u9805\u76ee\u306f\u3042\u308a\u307e\u305b\u3093\u3002<br>\u8a08\u753b\u30bf\u30d6\u3067\u9805\u76ee\u306b\u983b\u5ea6\u3092\u8a2d\u5b9a\u3057\u307e\u3057\u3087\u3046\u3002</div>';
    }else{
      inner=todos.map(function(t){var d=dom(t.domain);var done=doneOn(t,td);

    }
    var head='\uD83D\uDCCD \u4eca\u65e5\u53d6\u308a\u7d44\u3080\u3053\u3068'+(todos.length?' \uFF08'+doneN+'/'+todos.length+'\uFF09':'');
    return '<div class="card"><div class="label">'+head+'</div>'+inner+'</div>';
  }

  function plan(){
    var days=rangeDays(),start=today();
    var dayH=range==="1m"?14:range==="3m"?4.2:1.25;
    var trackH=Math.max(days*dayH,160);
    var axisW=52;            // roomier time axis
    var colW=52,colGap=14;   // wider bars, more breathing room
    var topPad=14;           // padding above first bar inside grid
    var sorted=tasks.filter(function(t){return t.end>=start;}).sort(function(a,b){return a.start.localeCompare(b.start)||a.domain.localeCompare(b.domain);});

    // grid lines + axis labels
    //   1m: 1日ごとに線（日付ラベル付き） / 3m: 1週間ごと / 1y: 月ごとのみ
    var lineHtml="",lblHtml="";
    var dayStep=(range==="1m")?1:(range==="3m")?7:9999; // 9999 = 月線のみ（dayStep線なし）
    for(var i=0;i<=days;i++){
      var d=new Date(start);d.setDate(d.getDate()+i);
      var dnum=d.getDate();
      var isMonth=(i===0||dnum===1);
      var top=topPad+i*dayH;
      if(isMonth){
        // i=0（今日）の位置は「今日」タグが示すので月ラベルは出さない（重なり防止）
        if(i!==0)lblHtml+='<div class="v-tick mon" style="top:'+top+'px"><span class="v-mnum">'+(d.getMonth()+1)+'</span><span class="v-msuf">\u6708</span></div>';
        lineHtml+='<div class="v-hline strong" style="top:'+top+'px"></div>';
      }else if(dayStep!==9999 && i%dayStep===0){
        lineHtml+='<div class="v-hline" style="top:'+top+'px"></div>';
        if(range==="1m"){
          lblHtml+='<div class="v-tick day" style="top:'+top+'px">'+dnum+'</div>';
        }else if(range==="3m"){
          // 月の線に近い週ラベルは重なるので省略
          var nd=new Date(d); nd.setDate(nd.getDate()+dayStep);   // 次の週ラベル位置
          var nearMonthStart = dnum<=4;                          // 月初の直後
          var nearMonthEnd = nd.getMonth()!==d.getMonth();       // 次の週で月が変わる＝月末付近
          if(!nearMonthStart && !nearMonthEnd)lblHtml+='<div class="v-tick wk" style="top:'+top+'px">'+dnum+'</div>';
        }
      }
    }

    // task columns — label sits as a rotated/clean tag above each bar's top
    var cols=sorted.length?sorted.map(function(t,idx){var d=dom(t.domain);
      var s=Math.max(dayDiff(start,t.start),0),e=Math.min(dayDiff(start,t.end),days);if(e<0)e=0;
      var top=topPad+s*dayH,h=Math.max((e-s)*dayH,26),clipped=t.start<start;
      var left=axisW+idx*(colW+colGap);
      var dur=dayDiff(t.start,t.end);
      return'<div class="v-bar row-tap" data-task="'+t.id+'" '+
        'style="left:'+left+'px;top:'+top+'px;width:'+colW+'px;height:'+h+'px;'+
        '--c:'+d.color+';background:linear-gradient(165deg,'+d.color+' 0%,'+d.color+'d9 100%);'+
        (clipped?"border-top-left-radius:3px;border-top-right-radius:3px":"")+'">'+
        '<span class="v-bar-emoji">'+d.emoji+'</span>'+
        '<span class="v-bar-tx">'+esc(t.title)+'</span>'+
        (h>52?'<span class="v-bar-dur">'+dur+'\u65e5</span>':'')+
        '</div>';}).join("")
      :"";

    var totalW=axisW+sorted.length*(colW+colGap)+8;
    var body=sorted.length?
      '<div class="v-scroll"><div class="v-inner" style="width:'+Math.max(totalW,300)+'px">'+
        '<div class="v-grid" style="height:'+(trackH+topPad)+'px">'+
          lineHtml+
          '<div class="v-axis" style="width:'+axisW+'px">'+lblHtml+'</div>'+
          '<div class="v-today" style="top:'+topPad+'px"><span class="v-today-tag">\u4eca\u65e5</span></div>'+
          cols+

  function coachInner(){
    // 未設定: Worker URL の入力を促す
    if(!workerUrl){

        '<div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px">\uD83E\uDD16 AI\u30b3\u30fc\u30c1\uff08\u4efb\u610f\uff09</div>'+
        '<div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:8px">1\u4eba\u3060\u3068\u504f\u308a\u304c\u3061\u306a\u8996\u70b9\u3092\u3001AI\u304c\u8907\u6570\u63d0\u793a\u3057\u307e\u3059\u3002\u4f7f\u3046\u306b\u306f\u4e2d\u7d99\u30b5\u30fc\u30d0\u30fc\u306eURL\u3092\u4e00\u5ea6\u3060\u3051\u767b\u9332\u3057\u307e\u3059\u3002</div>'+
        '<input id="wurl" class="input" placeholder="https://....workers.dev" style="font-size:12px;margin-bottom:8px">'+
        '<button id="wsave" style="font-size:12px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:9px;padding:8px 14px;cursor:pointer">\u767b\u9332</button></div>';
    }
    // 保存済みコメント履歴（古い順）を描画
    var log=dform.coachLog||[];
    var logHtml=log.map(function(entry,idx){
      var items=(entry.perspectives||[]).map(function(p){
        return '<div style="display:flex;gap:9px;padding:9px 11px;border-radius:11px;background:#fff;border:1px solid var(--border);margin-bottom:7px">'+
          '<span style="font-size:16px;flex:0 0 auto">'+esc(p.icon||"\uD83D\uDCA1")+'</span>'+
          '<div><div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:2px">'+esc(p.label||"")+'</div>'+
          '<div style="font-size:13px;line-height:1.65;color:var(--ink)">'+esc(p.text||"")+'</div></div></div>';
      }).join("");
      var q=entry.question?'<div style="margin-top:8px;padding:10px 12px;border-radius:11px;background:linear-gradient(135deg,rgba(108,92,231,.1),rgba(11,187,214,.08));font-size:13px;font-weight:600;color:var(--accent)">\u2753 '+esc(entry.question)+'</div>':'';
      var when="";
      try{var dt=new Date(entry.at);when=(dt.getMonth()+1)+"/"+dt.getDate()+" "+dt.getHours()+":"+("0"+dt.getMinutes()).slice(-2);}catch(e){}
      var del='<button class="coach-del" data-cidx="'+idx+'" style="font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer">\u524a\u9664</button>';
      return '<div style="margin-bottom:12px;padding-bottom:10px;'+(idx<log.length-1?'border-bottom:1px dashed var(--border)':'')+'">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
          '<span style="font-size:10px;color:var(--muted);font-weight:600">\uD83D\uDCAC '+(log.length>1?(idx+1)+'\u56de\u76ee \u00b7 ':'')+when+'</span>'+del+'</div>'+
        items+q+'</div>';
    }).join("");

    var inner=logHtml;
    if(coachState.loading){
      inner+='<div style="text-align:center;color:var(--accent);font-size:13px;padding:14px 0">\uD83E\uDD14 \u5225\u306e\u8996\u70b9\u3092\u8003\u3048\u3066\u3044\u307e\u3059\u2026</div>';
    }else if(coachState.error){
      inner+='<div style="font-size:12px;color:var(--red);padding:8px 0">'+esc(coachState.error)+'</div>';
    }

      inner+='<button id="coachBtn" class="btn" style="width:100%;font-size:14px;background:linear-gradient(135deg,#0bbbd6,#16c79a);box-shadow:0 6px 18px rgba(11,187,214,.25)">'+label+'</button>';
    }
    return '<div style="padding:13px 14px;border-radius:13px;background:#f7f8fc;border:1px solid var(--border)">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">'+
        '<span style="font-size:12px;font-weight:700;color:var(--accent)">\uD83E\uDD16 AI\u30b3\u30fc\u30c1'+(log.length?'\uFF08'+log.length+'\u4ef6\uFF09':'')+'</span>'+
        '<button id="wreset" style="font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer">\u8a2d\u5b9a</button></div>'+
      inner+'</div>';
  }

  function runCoach(){
    var ta=document.getElementById("dtext");
    if(ta)dform.text=ta.value;
    if(!dform.text.trim()){coachState.error="\u5148\u306b\u4eca\u65e5\u306e\u65e5\u8a18\u3092\u5c11\u3057\u66f8\u3044\u3066\u304b\u3089\u8a66\u3057\u3066\u304f\u3060\u3055\u3044\u3002";refreshCoach();return;}
    var past=diary.filter(function(e){return e.id!==dform.id;}).sort(function(a,b){return b.date.localeCompare(a.date);})[0];
    var tagNames=(dform.taskIds||[]).map(function(id){var t=tasks.filter(function(x){return x.id===id;})[0];return t?t.title:"";}).filter(Boolean).join("\u3001");
    coachState.loading=true;coachState.error=null;refreshCoach();
    fetch(workerUrl,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({today:dform.text,past:past?past.text:"",tags:tagNames})})
      .then(function(res){return res.json().then(function(j){return{ok:res.ok,j:j};});})
      .then(function(o){coachState.loading=false;
        if(!o.ok){coachState.error=(o.j&&o.j.error)?o.j.error:"\u30a8\u30e9\u30fc\u304c\u767a\u751f\u3057\u307e\u3057\u305f";}
        else{
          // 取得したコメントを日記の履歴に追記（保存対象）
          if(!dform.coachLog)dform.coachLog=[];
          dform.coachLog.push({at:new Date().toISOString(),perspectives:o.j.perspectives||[],question:o.j.question||""});
          // 既存の日記なら即座に保存（閉じても残る）
          if(dform.id){
            diary=diary.map(function(x){return x.id===dform.id?JSON.parse(JSON.stringify(dform)):x;});
            save();
          }
        }
        refreshCoach();})
      .catch(function(){coachState.loading=false;coachState.error="\u63a5\u7d9a\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002URL\u3092\u78ba\u8a8d\u3057\u3066\u304f\u3060\u3055\u3044\u3002";refreshCoach();});
  }

  // 日記本文を保ったままコーチ欄だけ差し替える（テキスト入力を消さない）
  function refreshCoach(){
    var box=document.getElementById("coachBox");
    if(box){box.innerHTML=coachInner();bindCoach();}
  }

  function bindCoach(){
    var b=document.getElementById("coachBtn");if(b)b.onclick=runCoach;
    var ws=document.getElementById("wsave");
    if(ws)ws.onclick=function(){var u=document.getElementById("wurl");if(u&&u.value.trim()){workerUrl=u.value.trim();localStorage.setItem(WKEY,workerUrl);refreshCoach();}};
    var wr=document.getElementById("wreset");
    if(wr)wr.onclick=function(){if(confirm("\u4e2d\u7d99\u30b5\u30fc\u30d0\u30fcURL\u3092\u518d\u8a2d\u5b9a\u3057\u307e\u3059\u304b\uff1f")){workerUrl="";localStorage.removeItem(WKEY);refreshCoach();}};
    document.querySelectorAll(".coach-del").forEach(function(b){b.onclick=function(){
      var i=+b.dataset.cidx;if(dform.coachLog&&dform.coachLog[i]!==undefined){dform.coachLog.splice(i,1);refreshCoach();}};});
  }

  // ────────── Google Drive 同期ロジック ──────────
  function gReady(){ return typeof google!=="undefined" && google.accounts && google.accounts.oauth2; }

  function gInit(){
    if(gTokenClient||!gReady())return;
    gTokenClient=google.accounts.oauth2.initTokenClient({
      client_id:GCLIENT_ID, scope:GSCOPE,
      callback:function(resp){
        if(gAuthTimer){clearTimeout(gAuthTimer);gAuthTimer=null;}
        if(resp&&resp.access_token){ gToken=resp.access_token; if(gPending){var f=gPending;gPending=null;f();} }
        else { gPending=null; setSync("error","\u8a8d\u8a3c\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002\u300c\u4fdd\u5b58\u300d\u3092\u62bc\u3057\u3066\u518d\u30ed\u30b0\u30a4\u30f3\u3057\u3066\u304f\u3060\u3055\u3044"); }
      },
      error_callback:function(){
        if(gAuthTimer){clearTimeout(gAuthTimer);gAuthTimer=null;}
        gPending=null;
        setSync("error","\u518d\u30ed\u30b0\u30a4\u30f3\u304c\u5fc5\u8981\u3067\u3059\u3002\u300c\u4fdd\u5b58\u300d\u3092\u62bc\u3057\u3066\u304f\u3060\u3055\u3044");
      }
    });
  }
  var gPending=null, gAuthTimer=null;
  function gAuth(then,interactive){
    if(!gReady()){ setSync("error","Google\u8aad\u307f\u8fbc\u307f\u4e2d\u3002\u6570\u79d2\u5f8c\u306b\u518d\u8a66\u884c\u3057\u3066\u304f\u3060\u3055\u3044"); return; }
    gInit(); gPending=then;
    // 既にトークンがあればそのまま実行（再認証不要）
    if(gToken && !interactive){ var f=gPending;gPending=null;f(); return; }
    // タイムアウト保険：8秒で応答がなければ状態を戻す
    if(gAuthTimer)clearTimeout(gAuthTimer);
    gAuthTimer=setTimeout(function(){
      gAuthTimer=null; gPending=null;
      setSync("error","\u63a5\u7d9a\u304c\u5b8c\u4e86\u3057\u307e\u305b\u3093\u3067\u3057\u305f\u3002\u300c\u4fdd\u5b58\u300d\u3092\u62bc\u3057\u3066\u518d\u8a66\u884c\u3057\u3066\u304f\u3060\u3055\u3044");
    },8000);
    gTokenClient.requestAccessToken({prompt: gToken?"":"consent"});
  }

  // appDataFolder 内の grow_data.json を探す
  function gFind(){
    return fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&pageSize=10",
      {headers:{Authorization:"Bearer "+gToken}})
      .then(function(r){return r.json();})
      .then(function(j){
        var f=(j.files||[]).filter(function(x){return x.name===GFILE;})[0];
        gFileId=f?f.id:null; return gFileId;
      });
  }

  function gSave(silent){
    if(!silent)setSync("busy","\u4fdd\u5b58\u4e2d\u2026");
    gAuth(function(){
      var payload={tasks:tasks,diary:diary,goals:goals,savedAt:new Date().toISOString()};
      gFind().then(function(id){
        var boundary="grow"+Date.now();
        var body="--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+
          JSON.stringify(id?{}:{name:GFILE,parents:["appDataFolder"]})+"\r\n"+
          "--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+
          JSON.stringify(payload)+"\r\n--"+boundary+"--";
        var url=id
          ? "https://www.googleapis.com/upload/drive/v3/files/"+id+"?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        return fetch(url,{method:id?"PATCH":"POST",
          headers:{Authorization:"Bearer "+gToken,"Content-Type":"multipart/related; boundary="+boundary},
          body:body});
      }).then(function(r){
        if(r.status===401){ gToken=null; setSync("error","\u30ed\u30b0\u30a4\u30f3\u671f\u9650\u5207\u308c\u3002\u300c\u4fdd\u5b58\u300d\u3092\u3082\u3046\u4e00\u5ea6\u62bc\u3057\u3066\u304f\u3060\u3055\u3044"); return; }
        if(!r.ok)throw new Error();
        var n=new Date();
        setSync("ok",(silent?"\u81ea\u52d5\u4fdd\u5b58 \u00b7 ":"\u4fdd\u5b58\u3057\u307e\u3057\u305f \u00b7 ")+n.getHours()+":"+("0"+n.getMinutes()).slice(-2));
      }).catch(function(){ setSync("error","\u4fdd\u5b58\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002\u300c\u4fdd\u5b58\u300d\u3067\u518d\u8a66\u884c"); });
    }, !silent);   // 手動保存はinteractive（必ず再ログイン可能）
  }

  function gLoad(silent){
    if(!silent)setSync("busy","\u8aad\u307f\u8fbc\u307f\u4e2d\u2026");
    gAuth(function(){
      gFind().then(function(id){
        if(!id){ if(!silent)setSync("error","\u30af\u30e9\u30a6\u30c9\u306b\u30c7\u30fc\u30bf\u304c\u307e\u3060\u3042\u308a\u307e\u305b\u3093"); else setSync("idle",""); return null; }
        return fetch("https://www.googleapis.com/drive/v3/files/"+id+"?alt=media",
          {headers:{Authorization:"Bearer "+gToken}}).then(function(r){
            if(r.status===401){ gToken=null; setSync("error","\u30ed\u30b0\u30a4\u30f3\u671f\u9650\u5207\u308c\u3002\u300c\u8aad\u307f\u8fbc\u3080\u300d\u3092\u3082\u3046\u4e00\u5ea6\u62bc\u3057\u3066\u304f\u3060\u3055\u3044"); return null; }
            return r.json();
          });
      }).then(function(data){
        if(!data)return;
        if(data.tasks)tasks=data.tasks;
        if(data.diary)diary=data.diary;
        if(data.goals)goals=data.goals;
        localStorage.setItem(TKEY,JSON.stringify(tasks));
        localStorage.setItem(DKEY,JSON.stringify(diary));
        localStorage.setItem(GKEY,JSON.stringify(goals));
        var info="";
        try{ if(data.savedAt){var sd=new Date(data.savedAt);info=" \u00b7 \u30af\u30e9\u30a6\u30c9\u4fdd\u5b58 "+(sd.getMonth()+1)+"/"+sd.getDate()+" "+sd.getHours()+":"+("0"+sd.getMinutes()).slice(-2);} }catch(e){}
        setSync("ok",(silent?"\u30af\u30e9\u30a6\u30c9\u3068\u540c\u671f\u6e08\u307f":"\u8aad\u307f\u8fbc\u307f\u307e\u3057\u305f \u00b7 \u65e5\u8a18"+diary.length+"\u4ef6")+info);
        render();
      }).catch(function(){ if(!silent)setSync("error","\u8aad\u307f\u8fbc\u307f\u306b\u5931\u6557\u3057\u307e\u3057\u305f"); });
    }, !silent);
  }

  // 変更後3秒でまとめて自動保存（デバウンス）
  function scheduleAutoSave(){
    if(!autoSync||!gToken)return;
    if(autoSaveTimer)clearTimeout(autoSaveTimer);
    setSync("busy","\u672a\u4fdd\u5b58\u306e\u5909\u66f4\u3042\u308a\u2026");
    autoSaveTimer=setTimeout(function(){autoSaveTimer=null;gSave(true);},3000);
  }

  // 自動同期のオン/オフ切替
  function toggleAutoSync(){
    autoSync=!autoSync;
    localStorage.setItem(AKEY,autoSync?"1":"0");
    if(autoSync){ gLoad(false); }   // オンにした瞬間に一度クラウドから読込（ログイン）
    else { setSync("idle",""); }
    refreshSync();
  }

  // 起動時：自動同期が有効なら一度だけ静かに読込
  function autoSyncOnStart(){
    if(!autoSync)return;
    var tries=0;
    var iv=setInterval(function(){
      tries++;
      if(gReady()){ clearInterval(iv); gLoad(true); }
      else if(tries>20){ clearInterval(iv); }   // 約10秒待っても無理なら諦める
    },500);
  }

  function setSync(status,msg){
    syncState={status:status,msg:msg};
    refreshSync();
  }
  function refreshSync(){
    var box=document.getElementById("syncBox");
    if(box){box.innerHTML=syncInner();bindSync();}
  }

  function syncInner(){
    var st=syncState;
    var badge=st.status==="ok"?'<span style="color:var(--green)">\u2713 '+esc(st.msg)+'</span>'
      :st.status==="error"?'<span style="color:var(--red)">'+esc(st.msg)+'</span>'
      :st.status==="busy"?'<span style="color:var(--accent)">'+esc(st.msg)+'</span>'
      :autoSync?'<span>\u81ea\u52d5\u540c\u671f\u4e2d \u00b7 \u958b\u304f\u3068\u8aad\u8fbc\u30fb\u5909\u66f4\u3067\u4fdd\u5b58</span>'
      :'<span>iPhone\u30fbPC\u9593\u3067\u30c7\u30fc\u30bf\u3092\u540c\u671f\u3067\u304d\u307e\u3059</span>';
    return '<div class="sync-toggle-row">'+
        '<span class="sync-toggle-lbl">\u81ea\u52d5\u540c\u671f</span>'+
        '<button class="sync-toggle'+(autoSync?" on":"")+'" id="syncToggle"><span class="knob"></span></button>'+
      '</div>'+
      '<div class="sync-row">'+
        '<button class="sync-btn primary" id="syncSave">\u2601\uFE0F \u4fdd\u5b58</button>'+
        '<button class="sync-btn ghost" id="syncLoad">\u2B07\uFE0F \u8aad\u307f\u8fbc\u3080</button>'+
      '</div><div class="sync-status">'+badge+'</div>';
  }

  function bindSync(){
    var s=document.getElementById("syncSave");if(s)s.onclick=function(){gSave(false);};
    var l=document.getElementById("syncLoad");if(l)l.onclick=function(){gLoad(false);};
    var t=document.getElementById("syncToggle");if(t)t.onclick=toggleAutoSync;
  }


  /* ================================================================
   * GROW Recall ビュー
   * ================================================================ */
  function km(el){ if(window.renderMathInElement) renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false}); }
  function rcEsc(s){ return String(s).replace(/[&<>]/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]);}); }

  function recallView(){
    var rs = recallStore;
    var stats =
      '<div style="display:flex;gap:7px;margin-bottom:10px;">' +
        rcStat(rs.count(),'カード','#1c2433') +
        rcStat(rs.dueToday().length,'今日','#e25141') +
        rcStat(rs.totalReviews(),'のべ','#2e8b57') +
        rcStat(rs.matured(),'定着','#3a6ea8') +
      '</div>';
    var subTabs =
      '<div style="display:flex;background:#e7edf4;border-radius:11px;padding:3px;margin-bottom:10px;">' +
        ['review','import','ledger'].map(function(n){
          var labels={review:'想起',import:'取り込み',ledger:'台帳'};
          return '<button onclick="rcSetTab(\''+n+'\')" style="flex:1;border:none;padding:9px 4px;font-size:13px;font-weight:700;border-radius:9px;background:'+(rcTab===n?'#fff':'transparent')+';color:'+(rcTab===n?'#1c2433':'#5a6678')+';box-shadow:'+(rcTab===n?'0 1px 3px rgba(0,0,0,.1)':'none')+';">'+labels[n]+'</button>';
        }).join('') +
      '</div>';
    var body = rcTab==='review' ? rcReviewPane(rs) : rcTab==='import' ? rcImportPane(rs) : rcLedgerPane(rs);
    return '<div style="padding:4px 0 60px;">' + stats + subTabs + body + '</div>';
  }
  function rcStat(v,l,c){ return '<div style="flex:1;text-align:center;background:#fff;border:1px solid #dce3ec;border-radius:11px;padding:9px 3px;"><div style="font-size:21px;font-weight:800;color:'+c+';font-family:serif;line-height:1;">'+v+'</div><div style="font-size:10px;color:#5a6678;margin-top:4px;">'+l+'</div></div>'; }

  function rcReviewPane(rs){
    var q = rs.dueToday();
    if(!q.length){
      return '<div style="background:#fff;border:1px solid #dce3ec;border-radius:14px;padding:20px;text-align:center;color:#5a6678;line-height:1.8;font-size:13px;">' +
        (rs.count() ? '今日の想起は完了です 🎉<br><span style="font-size:12px;">次回出題日まで休みましょう</span>' : 'まだカードがありません。<br>「取り込み」からカードを追加してください。') +
        '</div>';
    }
    rcCur = q[0];

    return '<div style="background:#fff;border:1px solid #dce3ec;border-radius:14px;padding:15px;" id="rcCard">' +
      '<div style="font-size:10.5px;font-weight:700;background:#fbf3e0;color:#c08a2d;padding:1px 8px;border-radius:99px;display:inline-block;margin-bottom:8px;">'+rcEsc(rcCur.type)+'</div>' +
      '<div id="rcQ" style="font-size:16px;font-weight:700;line-height:1.7;margin-bottom:12px;">'+rcEsc(rcCur.prompt)+'</div>' +
      '<div style="display:flex;gap:7px;">' +
        '<button onclick="rcReveal()" id="rcRevBtn" style="border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;background:#3a6ea8;color:#fff;">答えを表示</button>' +
        '<span style="font-size:11.5px;color:#9aa6b6;margin-top:auto;padding-bottom:2px;">残り'+q.length+'問</span>' +
      '</div>' +
      '<div id="rcAns" style="display:none;border-top:1px dashed #dce3ec;margin-top:12px;padding-top:12px;font-size:14.5px;line-height:1.85;"></div>' +
      '<div id="rcGrades" style="display:none;gap:6px;margin-top:14px;"></div>' +
    '</div>';
  }

  function rcImportPane(){
    var prev = rcParsed ? (
      '<div style="margin-top:9px;">' +
        '<div style="display:flex;gap:8px;margin-bottom:8px;">' +
          ['新規','更新','不変'].map(function(l,i){ var v=[rcDiff.n,rcDiff.u,rcDiff.s][i]; var c=['#2e8b57','#3a6ea8','#9aa6b6'][i]; return '<div style="flex:1;text-align:center;border:1px solid #dce3ec;border-radius:9px;padding:7px 3px;background:#fbfcfe;"><div style="font-size:18px;font-weight:800;color:'+c+';font-family:serif;">'+v+'</div><div style="font-size:10px;color:#5a6678;">'+l+'</div></div>'; }).join('') +
        '</div>' +
        rcParsed.cards.slice(0,4).map(function(c){ return '<div style="border:1px solid #dce3ec;border-radius:9px;padding:8px 10px;margin:5px 0;background:#fbfcfe;font-size:12.5px;"><span style="display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;background:#fbf3e0;color:#c08a2d;margin-right:5px;">'+c.type+'</span>'+rcEsc(c.prompt)+'</div>'; }).join('') +
        (rcParsed.cards.length>4?'<div style="font-size:11.5px;color:#5a6678;">…他 '+(rcParsed.cards.length-4)+'枚</div>':'') +
        '<div style="margin-top:9px;display:flex;gap:7px;">' +
          '<button id="rcMergeBtn" onclick="rcDoMerge()" style="border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;background:#c08a2d;color:#fff;">'+(rcDiff&&(rcDiff.n+rcDiff.u)>0?'取り込む（マージ）':'変更なし')+'</button>' +
        '</div>' +
      '</div>'
    ) : '';
    return '<div style="background:#fff;border:1px solid #dce3ec;border-radius:14px;padding:14px;">' +
      '<div style="font-size:14px;font-weight:700;margin-bottom:9px;">スキル出力JSONを貼り付け</div>' +
      '<textarea id="rcTa" style="width:100%;min-height:100px;border:1px solid #dce3ec;border-radius:9px;padding:9px;font-family:ui-monospace,monospace;font-size:12px;line-height:1.6;background:#fbfcfe;resize:vertical;" placeholder="grow-recall-cards のJSONを貼り付け…"></textarea>' +
      '<div id="rcMsg" style="font-size:12.5px;line-height:1.7;padding:8px 10px;border-radius:8px;margin-top:8px;display:none;"></div>' +
      '<div style="display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;">' +
        '<button onclick="rcSample()" style="border:1px solid #dce3ec;border-radius:9px;padding:9px 12px;font-size:12.5px;font-weight:700;background:#fff;color:#5a6678;">サンプル</button>' +
        '<button onclick="rcValidate()" style="border:none;border-radius:9px;padding:9px 12px;font-size:13px;font-weight:700;background:#3a6ea8;color:#fff;">検証</button>' +
        '<button onclick="rcClearTa()" style="border:1px solid #dce3ec;border-radius:9px;padding:9px 12px;font-size:12.5px;font-weight:700;background:#fff;color:#5a6678;">クリア</button>' +
      '</div>' + prev + '</div>';
  }

  function rcLedgerPane(rs){
    var cov = rs.coverage(); var ents = Object.entries(cov).sort(function(a,b){return b[1]-a[1];});
    var chips = ents.length ? ents.map(function(e){ return '<span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:#e9f1fb;color:#3a6ea8;">'+rcEsc(e[0])+'<span style="opacity:.7;margin-left:4px;">'+e[1]+'</span></span>'; }).join(' ') : '<span style="font-size:12px;color:#5a6678;">なし</span>';
    var cards = rs.live().sort(function(a,b){return a.srs.due<b.srs.due?-1:1;});
    var rows = cards.map(function(c){
      return '<div style="display:flex;align-items:center;gap:8px;border:1px solid #dce3ec;border-radius:9px;padding:8px 9px;margin:5px 0;background:#fbfcfe;">' +
        '<span style="flex:1;font-size:12px;font-weight:600;line-height:1.4;">'+(c.tags||[]).map(function(t){return '<span style="font-size:10px;color:#3a6ea8;font-weight:700;margin-right:4px;">#'+rcEsc(t)+'</span>';}).join('')+'<br>'+rcEsc(c.prompt)+'</span>' +
        '<span style="font-size:10.5px;color:#5a6678;text-align:right;white-space:nowrap;"><span style="color:#2e8b57;font-weight:700;">のべ'+rs.reviewsOf(c.id)+'</span><br>reps '+c.srs.reps+'<br>次回 '+c.srs.due.slice(5)+'</span>' +
        '<button onclick="rcDel(\''+c.id+'\')" style="border:none;background:none;color:#e25141;font-size:16px;padding:2px 6px;">×</button>' +
      '</div>';
    }).join('');
    return '<div style="background:#fff;border:1px solid #dce3ec;border-radius:14px;padding:14px;margin-bottom:10px;">' +
        '<div style="font-size:13px;font-weight:700;margin-bottom:7px;">範囲カバレッジ</div>' + chips + '</div>' +
      '<div style="background:#fff;border:1px solid #dce3ec;border-radius:14px;padding:14px;margin-bottom:10px;">' +
        '<div style="font-size:13px;font-weight:700;margin-bottom:7px;">同期（Google Drive）</div>' +
        '<button onclick="rcSync()" style="border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;background:#c08a2d;color:#fff;">クラウドと同期</button>' +
      '</div>' +
      '<div style="background:#fff;border:1px solid #dce3ec;border-radius:14px;padding:14px;">' +
        '<div style="font-size:13px;font-weight:700;margin-bottom:7px;">カード一覧（'+cards.length+'枚）</div>' + rows +

  /* ---- Recall ハンドラ（onclick から呼ぶ） ---- */
  var rcDiff={n:0,u:0,s:0};
  function rcSetTab(t){ rcTab=t; rcParsed=null; render(); }
  function rcReveal(){
    var ans=document.getElementById('rcAns'); if(!ans||!rcCur)return;
    ans.innerHTML=rcEsc(rcCur.answer)+(rcCur.note?'<div style="margin-top:7px;font-size:12.5px;color:#c08a2d;">💡 '+rcEsc(rcCur.note)+'</div>':'');
    km(ans); ans.style.display='block';
    var rb=document.getElementById('rcRevBtn'); if(rb)rb.style.display='none';
    var gr=document.getElementById('rcGrades'); if(gr){
      gr.style.display='flex'; gr.style.gap='6px';
      gr.innerHTML=['もう一度','難しい','普通','簡単'].map(function(l,i){
        var q=[2,3,4,5][i]; var bg=['#fdecea','#fbf3e0','#e9f1fb','#e8f4ec'][i]; var col=['#e25141','#c08a2d','#3a6ea8','#2e8b57'][i];
        return '<button onclick="rcGrade('+q+')" style="flex:1;border:none;border-radius:9px;padding:11px 3px;font-size:12px;font-weight:700;background:'+bg+';color:'+col+';">'+l+'</button>';
      }).join('');
    }
  }
  function rcGrade(q){
    if(!rcCur)return;
    recallStore.review(rcCur.id,q);
    var intv=recallStore.get(rcCur.id).srs.intervalDays;
    rcShowToast(q<3?'もう一度（明日）':'次回 '+intv+'日後');
    render();
  }
  function rcValidate(){
    rcParsed=null;
    var ta=document.getElementById('rcTa'); if(!ta)return;
    var obj; try{ obj=JSON.parse(ta.value); }catch(e){ rcMsgShow('err','JSON構文エラー: '+e.message); return; }
    var errs=RL.validateImport(obj);
    if(errs.length){ rcMsgShow('err','検証エラー（'+errs.length+'件）: '+errs.join(' / ')); return; }
    rcParsed=obj;
    var n=0,u=0,s=0;
    obj.cards.forEach(function(c){ var ex=recallStore.get(c.id); if(!ex)n++; else (ex.answer!==c.answer||ex.prompt!==c.prompt)?u++:s++; });
    rcDiff={n:n,u:u,s:s};
    rcMsgShow('ok','✓ 契約に適合（'+obj.cards.length+'枚 / 出典: '+rcEsc(obj.source)+'）');
    render();
  }
  function rcDoMerge(){
    if(!rcParsed)return;
    var r=recallStore.import(rcParsed);
    if(!r.ok){ rcShowToast('取り込み失敗'); return; }
    rcShowToast('✓ 新規'+r.added+' / 更新'+r.updated);
    rcParsed=null; rcTab='review'; render();
  }
  function rcSample(){
    var ta=document.getElementById('rcTa'); if(!ta)return;
    ta.value=JSON.stringify({format:"grow-recall-cards",version:1,source:"統計検定準1級 サンプル 問1",created:today(),cards:[
      {id:"cc65a88f",type:"free_recall",tags:["検定","t分布"],prompt:"母分散が未知のとき、zでなくtを使う理由を説明せよ",answer:"標本から $s$ を推定する分ばらつきが大きく、裾の重い $t$ 分布（自由度 $n-1$）に従うため。",note:"自由度→∞でtはzに一致"},
      {id:"74b1a515",type:"cloze",tags:["t分布"],prompt:"自由度 $\\nu\\to\\infty$ で t分布が一致する分布は？",answer:"標準正規分布"},
      {id:"5a7357b4",type:"cued",tags:["適用条件"],prompt:"対応のある2群の平均差。前提が満たされるとき使う検定は？",answer:"対応のある t 検定（差の母平均 $=0$ を検定）"}
    ]},null,2);
    rcParsed=null;
  }
  function rcClearTa(){ var ta=document.getElementById('rcTa'); if(ta)ta.value=''; rcParsed=null; }
  function rcDel(id){ if(!confirm('このカードを削除しますか？'))return; recallStore.delete(id); render(); }
  async function rcSync(){
    try{
      rcShowToast('同期中…');
      var r=await recallStore.sync();
      rcShowToast('✓ 同期完了 '+r.total+'枚 / のべ'+r.totalReviews);
    }catch(e){ rcShowToast('同期エラー: '+e.message); }
    render();
  }
  async function rcReset(){ if(!confirm('台帳の全カードと進捗を削除します。よろしいですか？'))return; recallStore.data=RL._util.emptyStore(); await recallStore._persist(); render(); }
  function rcMsgShow(type,msg){
    var el=document.getElementById('rcMsg'); if(!el)return;
    el.style.display='block'; el.style.background=type==='ok'?'#e8f4ec':'#fdecea'; el.style.color=type==='ok'?'#2e8b57':'#e25141'; el.style.borderLeft='3px solid '+(type==='ok'?'#2e8b57':'#e25141'); el.style.padding='8px 10px'; el.innerHTML=msg;
  }
  var rcToastTimer=null;
  function rcShowToast(msg){
    var el=document.getElementById('rcToast');
    if(!el){ el=document.createElement('div'); el.id='rcToast'; el.style.cssText='position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom)+20px);transform:translateX(-50%) translateY(20px);background:#1c2433;color:#fff;padding:11px 18px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;transition:.3s;z-index:999;box-shadow:0 6px 20px rgba(0,0,0,.2);'; document.body.appendChild(el); }
    el.textContent=msg; el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)';
    if(rcToastTimer)clearTimeout(rcToastTimer);
    rcToastTimer=setTimeout(function(){ el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(20px)'; },1800);
  }

  // recall ハンドラをグローバルに公開（inline onclickから呼べるようにする）
  window.rcSetTab=function(t){rcTab=t;rcParsed=null;render();};
  window.rcReveal=function(){
    var ans=document.getElementById('rcAns'); if(!ans||!rcCur)return;
    ans.innerHTML=rcEsc(rcCur.answer)+(rcCur.note?'<div style="margin-top:7px;font-size:12.5px;color:#c08a2d;">💡 '+rcEsc(rcCur.note)+'</div>':'');
    km(ans); ans.style.display='block';
    var rb=document.getElementById('rcRevBtn'); if(rb)rb.style.display='none';
    var gr=document.getElementById('rcGrades'); if(gr){
      gr.style.display='flex'; gr.style.gap='6px';
      gr.innerHTML=['もう一度','難しい','普通','簡単'].map(function(l,i){
        var q=[2,3,4,5][i]; var bg=['#fdecea','#fbf3e0','#e9f1fb','#e8f4ec'][i]; var col=['#e25141','#c08a2d','#3a6ea8','#2e8b57'][i];
        return '<button onclick="rcGrade('+q+')" style="flex:1;border:none;border-radius:9px;padding:11px 3px;font-size:12px;font-weight:700;background:'+bg+';color:'+col+';">'+l+'</button>';
      }).join('');
    }
  };
  window.rcGrade=function(q){
    if(!rcCur)return;
    recallStore.review(rcCur.id,q);
    var intv=recallStore.get(rcCur.id).srs.intervalDays;
    rcShowToast(q<3?'もう一度（明日）':'次回 '+intv+'日後');
    render();
  };
  window.rcValidate=function(){
    rcParsed=null;
    var ta=document.getElementById('rcTa'); if(!ta)return;
    var obj; try{ obj=JSON.parse(ta.value); }catch(e){ rcMsgShow('err','JSON構文エラー: '+e.message); return; }
    var errs=RL.validateImport(obj);
    if(errs.length){ rcMsgShow('err','検証エラー（'+errs.length+'件）: '+errs.join(' / ')); return; }
    rcParsed=obj;
    var n=0,u=0,s=0;
    obj.cards.forEach(function(c){ var ex=recallStore.get(c.id); if(!ex)n++; else (ex.answer!==c.answer||ex.prompt!==c.prompt)?u++:s++; });
    rcDiff={n:n,u:u,s:s};
    rcMsgShow('ok','✓ 契約に適合（'+obj.cards.length+'枚 / 出典: '+rcEsc(obj.source)+'）');
    render();
  };
  window.rcDoMerge=function(){
    if(!rcParsed)return;
    var r=recallStore.import(rcParsed);
    if(!r.ok){ rcShowToast('取り込み失敗'); return; }
    rcShowToast('✓ 新規'+r.added+' / 更新'+r.updated);
    rcParsed=null; rcTab='review'; render();
  };
  window.rcSample=function(){
    var ta=document.getElementById('rcTa'); if(!ta)return;
    ta.value=JSON.stringify({format:"grow-recall-cards",version:1,source:"統計検定準1級 サンプル 問1",created:today(),cards:[
      {id:"cc65a88f",type:"free_recall",tags:["検定","t分布"],prompt:"母分散が未知のとき、zでなくtを使う理由を説明せよ",answer:"標本から $s$ を推定する分ばらつきが大きく、裾の重い $t$ 分布（自由度 $n-1$）に従うため。",note:"自由度→∞でtはzに一致"},
      {id:"74b1a515",type:"cloze",tags:["t分布"],prompt:"自由度 $\nu\to\infty$ で t分布が一致する分布は？",answer:"標準正規分布"},
      {id:"5a7357b4",type:"cued",tags:["適用条件"],prompt:"対応のある2群の平均差。前提が満たされるとき使う検定は？",answer:"対応のある t 検定（差の母平均 $=0$ を検定）"}
    ]},null,2);
    rcParsed=null;
  };
  window.rcClearTa=function(){ var ta=document.getElementById('rcTa'); if(ta)ta.value=''; rcParsed=null; };
  window.rcDel=function(id){ if(!confirm('このカードを削除しますか？'))return; recallStore.delete(id); render(); };
  window.rcSync=async function(){
    try{ rcShowToast('同期中…'); var r=await recallStore.sync(); rcShowToast('✓ 同期完了 '+r.total+'枚 / のべ'+r.totalReviews); }
    catch(e){ rcShowToast('同期エラー: '+e.message); }
    render();
  };
  window.rcReset=async function(){ if(!confirm('台帳の全カードと進捗を削除します。よろしいですか？'))return; recallStore.data=RL._util.emptyStore(); await recallStore._persist(); render(); };

  function render(){
    var app=document.getElementById("app");
    app.innerHTML=
      '<div class="header"><div class="logo">GROW \u2726 <span style="font-size:10px;font-weight:400;color:#9aa6b6;letter-spacing:.04em;">v'+GROW_VERSION+'</span></div>'+
        '<div class="date">'+new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"long"})+'</div></div>'+
      '<div class="content">'+(tab==="home"?home():tab==="plan"?plan():tab==="diary"?diaryView():recallView())+'</div>'+
      (tab!=="home"&&tab!=="recall"?'<button class="fab" id="fab">\uFF0B</button>':"")+
      (showSheet==="task"?taskSheet():showSheet==="diary"?diarySheet():"")+
      '<div class="tabbar">'+
        [["home","\uD83C\uDFE0","\u30db\u30fc\u30e0"],["plan","\uD83D\uDCCA","\u8a08\u753b"],["diary","\uD83D\uDCD4","\u65e5\u8a18"],["recall","\uD83E\uDDE0","\u60F3\u8D77"]].map(function(x){
          return'<button class="tab '+(tab===x[0]?"on":"")+'" data-tab="'+x[0]+'"><span class="ic">'+x[1]+'</span>'+x[2]+'</button>';}).join("")+
      '</div>';
    bind();
  }

  function bind(){
    bindSync();
    document.querySelectorAll("[data-done]").forEach(function(b){b.onclick=function(){toggleDone(+b.dataset.done);};});
    var tb=document.querySelectorAll("[data-tab]");tb.forEach(function(b){b.onclick=function(){tab=b.dataset.tab;showSheet=null;render();};});
    document.querySelectorAll("[data-range]").forEach(function(b){b.onclick=function(){range=b.dataset.range;render();};});
    var fab=document.getElementById("fab");
    if(fab)fab.onclick=function(){if(tab==="plan"){tform=blankTask();showSheet="task";}else if(tab==="diary"){dform=blankDiary();compareDate=null;coachState={loading:false,result:null,error:null};showSheet="diary";}render();};
    document.querySelectorAll("[data-task]").forEach(function(b){b.onclick=function(){
      var t=tasks.filter(function(x){return x.id==b.dataset.task;})[0];if(t){tform=JSON.parse(JSON.stringify(t));if(!tform.freq)tform.freq={type:"daily",times:3,days:[]};if(!tform.done)tform.done=[];showSheet="task";render();}};});
    document.querySelectorAll("[data-diary]").forEach(function(b){b.onclick=function(){
      var e=diary.filter(function(x){return x.id==b.dataset.diary;})[0];if(e){dform=JSON.parse(JSON.stringify(e));if(!dform.taskIds)dform.taskIds=[];if(!dform.coachLog)dform.coachLog=[];compareDate=null;coachState={loading:false,result:null,error:null};showSheet="diary";render();}};});

    var modal=document.getElementById("modal");
    if(modal){
      modal.onclick=function(e){if(e.target.id==="modal"){showSheet=null;render();}};
      document.querySelectorAll("[data-dom]").forEach(function(b){b.onclick=function(){tform.domain=b.dataset.dom;render();};});
      var tt=document.getElementById("ttitle");if(tt)tt.oninput=function(){tform.title=tt.value;};
      var td=document.getElementById("tdesc");if(td)td.oninput=function(){tform.desc=td.value;};
      if(!tform.freq)tform.freq={type:"daily",times:3,days:[]};
      document.querySelectorAll("[data-ftype]").forEach(function(b){b.onclick=function(){tform.freq.type=b.dataset.ftype;render();};});
      document.querySelectorAll("[data-ftimes]").forEach(function(b){b.onclick=function(){tform.freq.times=+b.dataset.ftimes;render();};});
      document.querySelectorAll("[data-fwd]").forEach(function(b){b.onclick=function(){
        var w=+b.dataset.fwd;if(!tform.freq.days)tform.freq.days=[];
        var i=tform.freq.days.indexOf(w);if(i>=0)tform.freq.days.splice(i,1);else tform.freq.days.push(w);render();};});
      var ts=document.getElementById("tstart");if(ts)ts.onchange=function(){tform.start=ts.value;};
      var te=document.getElementById("tend");if(te)te.onchange=function(){tform.end=te.value;};
      var sT=document.getElementById("saveTask");
      if(sT)sT.onclick=function(){if(!tform.title.trim())return;if(tform.end<tform.start)tform.end=tform.start;
        if(tform.id){tasks=tasks.map(function(x){return x.id===tform.id?JSON.parse(JSON.stringify(tform)):x;});}
        else{tform.id=Date.now();tasks.push(JSON.parse(JSON.stringify(tform)));}
        showSheet=null;save();render();};
      var dT=document.getElementById("delTask");
      if(dT)dT.onclick=function(){tasks=tasks.filter(function(x){return x.id!==tform.id;});showSheet=null;save();render();};
      document.querySelectorAll("[data-mood]").forEach(function(b){b.onclick=function(){dform.mood=+b.dataset.mood;render();};});
      document.querySelectorAll("[data-tag]").forEach(function(b){b.onclick=function(){
        if(!dform.taskIds)dform.taskIds=[];
        var id=+b.dataset.tag,i=dform.taskIds.indexOf(id);
        if(i>=0)dform.taskIds.splice(i,1);else dform.taskIds.push(id);
        render();};});
      var cs=document.getElementById("cmpsel");if(cs)cs.onchange=function(){compareDate=cs.value;render();};
      var dd=document.getElementById("ddate");if(dd)dd.onchange=function(){dform.date=dd.value;};
      var dx=document.getElementById("dtext");if(dx)dx.oninput=function(){dform.text=dx.value;};
      bindCoach();
      var sD=document.getElementById("saveDiary");
      if(sD)sD.onclick=function(){if(!dform.text.trim())return;
        if(dform.id){diary=diary.map(function(x){return x.id===dform.id?JSON.parse(JSON.stringify(dform)):x;});}
        else{dform.id=Date.now();diary.push(JSON.parse(JSON.stringify(dform)));}
        showSheet=null;save();render();};
      var dD=document.getElementById("delDiary");
      if(dD)dD.onclick=function(){diary=diary.filter(function(x){return x.id!==dform.id;});showSheet=null;save();render();};
    }
  }

  render();
  autoSyncOnStart();
})();
</script>
