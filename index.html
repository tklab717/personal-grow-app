<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GROW">
<meta name="theme-color" content="#f4f6fb">
<title>GROW &#10022; &#25104;&#38263;&#12503;&#12521;&#12531;&#12490;&#12540;</title>
<style>
  :root{
    --bg:#f4f6fb; --surface:#ffffff; --card:#ffffff; --border:#e6e9f2;
    --accent:#6c5ce7; --accentGlow:rgba(108,92,231,.18);
    --gold:#f0a500; --green:#16c79a; --red:#ff5d73; --cyan:#0bbbd6;
    --text:#1c2238; --muted:#8a90a6;
    --grid:#eceff7; --gridStrong:#dfe3ee;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;
    background:linear-gradient(180deg,#eef1fb 0%,#f4f6fb 30%) fixed,var(--bg);color:var(--text);
    font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior:none;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-top:env(safe-area-inset-top);}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  .header{padding:18px 20px 4px;display:flex;justify-content:space-between;align-items:center;}
  .logo{font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-.5px;}
  .date{font-size:11px;color:var(--muted);}
  .content{padding:16px 16px 120px;}
  .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;
    box-shadow:0 6px 20px rgba(28,34,56,.06);}
  .btn{background:linear-gradient(135deg,#6c5ce7,#8e7bff);color:#fff;border:none;
    border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;box-shadow:0 6px 18px var(--accentGlow);}
  .btn:active{transform:scale(.97);}
  .input{width:100%;background:#f7f8fc;border:1px solid var(--border);border-radius:10px;
    padding:11px 12px;color:var(--text);font-size:14px;outline:none;}
  .input:focus{border-color:var(--accent);background:#fff;}
  textarea.input{resize:vertical;min-height:90px;line-height:1.6;}
  .ring-wrap{position:relative;width:110px;height:110px;margin:0 auto;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
  @keyframes rot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .ring-outer{position:absolute;inset:0;border-radius:50%;border:3px solid var(--accent);
    box-shadow:0 0 20px var(--accentGlow);animation:pulse 2s ease-in-out infinite;}
  .ring-mid{position:absolute;inset:8px;border-radius:50%;animation:rot 8s linear infinite;opacity:.4;}
  .ring-core{position:absolute;inset:12px;border-radius:50%;background:var(--surface);
    display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-num{font-size:28px;font-weight:900;color:var(--gold);line-height:1;}
  .ring-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
  .stat-row{margin-top:14px;display:flex;justify-content:center;gap:28px;}
  .stat-num{font-size:22px;font-weight:800;}
  .stat-lbl{font-size:10px;color:var(--muted);}
  .seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;gap:3px;}
  .seg button{flex:1;border:none;background:none;color:var(--muted);font-size:12px;font-weight:600;padding:7px 0;border-radius:8px;}
  .seg button.on{background:var(--accent);color:#fff;}
  /* vertical timeline gantt */
  /* ── vertical gantt (refined) ── */
  .g-seg-wrap{margin-bottom:14px;}
  .g-card{padding:16px 10px 18px;overflow:hidden;}
  .v-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
  .v-scroll::-webkit-scrollbar{height:5px;}
  .v-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .v-inner{position:relative;}
  .v-grid{position:relative;}
  .v-axis{position:absolute;left:0;top:0;z-index:1;}
  .v-tick{position:absolute;left:0;transform:translateY(-50%);color:var(--muted);}
  .v-tick.mon{display:flex;align-items:baseline;gap:1px;font-weight:800;color:var(--ink);}
  .v-mnum{font-size:15px;letter-spacing:-.5px;}
  .v-msuf{font-size:9px;color:var(--muted);font-weight:600;}
  .v-tick.wk{font-size:10px;color:#aeb4c6;font-weight:600;}
  .v-tick.day{font-size:9px;color:#bcc1d0;font-weight:600;}
  .v-hline{position:absolute;left:48px;right:0;height:1px;background:var(--grid);z-index:0;}
  .v-hline.strong{background:var(--gridStrong);}
  .v-today{position:absolute;left:48px;right:0;height:2px;
    background:linear-gradient(90deg,var(--gold),rgba(240,165,0,.3));border-radius:2px;z-index:5;}
  .v-today-tag{position:absolute;left:0;top:-9px;font-size:9px;font-weight:800;color:#fff;
    background:var(--gold);padding:2px 7px;border-radius:10px;box-shadow:0 2px 6px rgba(240,165,0,.4);white-space:nowrap;z-index:6;}
  .v-bar{position:absolute;border-radius:10px;z-index:2;padding:7px 5px 5px;overflow:hidden;cursor:pointer;
    box-shadow:0 4px 12px -2px rgba(28,36,51,.22),inset 0 1px 0 rgba(255,255,255,.25);
    box-shadow:0 4px 14px -2px color-mix(in srgb,var(--c) 55%,transparent),inset 0 1px 0 rgba(255,255,255,.25);
    transition:transform .12s ease,box-shadow .12s ease;
    display:flex;flex-direction:column;align-items:center;}
  .v-bar:active{transform:scale(.97);}
  .v-bar-emoji{font-size:13px;line-height:1;margin-bottom:3px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.15));}
  .v-bar-tx{font-size:10px;font-weight:700;color:#fff;line-height:1.3;text-align:center;
    display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;
    text-shadow:0 1px 2px rgba(0,0,0,.2);}
  .v-bar-dur{margin-top:auto;font-size:8.5px;font-weight:700;color:rgba(255,255,255,.85);
    background:rgba(255,255,255,.18);padding:1px 6px;border-radius:8px;}
  /* legend */
  .g-legend{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
  .g-leg{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--muted);
    background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:5px 12px;
    box-shadow:0 1px 4px rgba(28,36,51,.04);}
  .g-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .g-dot.today{background:var(--gold);width:14px;height:4px;border-radius:3px;}
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:var(--surface);border-top:1px solid var(--border);display:flex;
    padding:8px 0 calc(18px + env(safe-area-inset-bottom));z-index:50;}
  .tab{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10px;}
  .tab.on{color:var(--accent);font-weight:700;}
  .tab .ic{font-size:20px;}
  .fab{position:fixed;bottom:calc(78px + env(safe-area-inset-bottom));right:max(16px,calc(50% - 224px));
    width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#5a3fd8);
    border:none;font-size:28px;color:#fff;box-shadow:0 4px 24px var(--accentGlow);
    display:flex;align-items:center;justify-content:center;z-index:60;}
  .fab:active{transform:scale(.92);}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
  .sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px calc(36px + env(safe-area-inset-bottom));
    width:100%;max-width:480px;border:1px solid var(--border);animation:up .25s ease;max-height:88vh;overflow-y:auto;}
  @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .dom-pick{flex:1;padding:8px 4px;border-radius:10px;border:2px solid var(--border);background:var(--bg);
    color:var(--text);font-size:18px;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .dom-pick .nm{font-size:9px;color:var(--muted);}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:28px 16px;line-height:1.7;}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;
    background:var(--surface);border:1px solid var(--border);color:var(--muted);}
  .tagchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
    padding:6px 12px;border-radius:20px;background:#fff;border:1.5px solid var(--border);
    cursor:pointer;transition:all .12s;}
  .tagchip:active{transform:scale(.95);}
  .tagchip.on{box-shadow:0 2px 8px rgba(0,0,0,.12);}
  .diary-card{padding:14px;}
  .diary-date{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:6px;}
  .diary-text{font-size:13px;line-height:1.7;white-space:pre-wrap;}
  .row-tap{cursor:pointer;}
  /* cloud sync */
  .sync-row{display:flex;gap:9px;align-items:center;}
  .sync-btn{flex:1;border:none;border-radius:11px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
  .sync-btn.primary{background:linear-gradient(135deg,#4285f4,#3a6ea8);color:#fff;}
  .sync-btn.ghost{background:#fff;border:1.5px solid var(--border);color:var(--ink);}
  .sync-btn:active{transform:scale(.97);}
  .sync-status{font-size:11px;color:var(--muted);margin-top:8px;text-align:center;line-height:1.6;}
  .sync-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
  .sync-toggle-lbl{font-size:13px;font-weight:700;color:var(--ink);}
  .sync-toggle{position:relative;width:46px;height:26px;border-radius:14px;border:none;background:var(--border);cursor:pointer;transition:background .2s;padding:0;}
  .sync-toggle.on{background:linear-gradient(135deg,#4285f4,#3a6ea8);}
  .sync-toggle .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:left .2s;}
  .sync-toggle.on .knob{left:23px;}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<body>
<div id="app"></div>
<script>
(function(){
  var DOMAINS=[
    {id:"work",label:"\u4ed5\u4e8b",emoji:"\uD83D\uDCBC",color:"#7c5cfc"},
    {id:"health",label:"\u5065\u5eb7",emoji:"\uD83D\uDCAA",color:"#2dce89"},
    {id:"study",label:"\u5b66\u7fd2",emoji:"\uD83D\uDCDA",color:"#f5c542"},
    {id:"habit",label:"\u7fd2\u6163",emoji:"\uD83C\uDF31",color:"#11cdef"}
  ];
  var MOODS=["\uD83D\uDE24","\uD83D\uDE10","\uD83D\uDE42","\uD83D\uDE0A","\uD83D\uDD25"];
  var TKEY="grow_tasks_v2",DKEY="grow_diary_v2",GKEY="grow_goals_v2",WKEY="grow_worker_url";
  var workerUrl=localStorage.getItem(WKEY)||"";
  var coachState={loading:false,result:null,error:null};

  // ── Google Drive 同期 ──
  var GCLIENT_ID="655655081248-9c1l0hop7kmjrkl44eaa8vn4ugj5e0nj.apps.googleusercontent.com";
  var GSCOPE="https://www.googleapis.com/auth/drive.appdata";
  var GFILE="grow_data.json";
  var AKEY="grow_autosync";
  var gToken=null, gTokenClient=null, gFileId=null;
  var syncState={status:"idle",msg:""}; // idle|busy|ok|error
  var autoSync=localStorage.getItem(AKEY)==="1";
  var autoSaveTimer=null;

  var tasks=load(TKEY,[]),diary=load(DKEY,[]),goals=load(GKEY,[]);
  var tab="home",range="1m",showSheet=null;
  var tform=blankTask(),dform=blankDiary(),compareDate=null;

  function blankTask(){return{id:null,domain:"work",title:"",desc:"",start:today(),end:addDays(today(),14),goalId:""};}
  function blankDiary(){return{id:null,date:today(),mood:3,text:"",taskIds:[]};}
  function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch(e){return d}}
  function save(){localStorage.setItem(TKEY,JSON.stringify(tasks));localStorage.setItem(DKEY,JSON.stringify(diary));localStorage.setItem(GKEY,JSON.stringify(goals));scheduleAutoSave();}
  function today(){return new Date().toISOString().slice(0,10);}
  function addDays(iso,n){var d=new Date(iso);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
  function dayDiff(a,b){return Math.round((new Date(b)-new Date(a))/864e5);}
  function fmt(iso){return new Date(iso).toLocaleDateString("ja-JP",{month:"short",day:"numeric"});}
  function fmtFull(iso){return new Date(iso).toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"});}
  function dom(id){for(var i=0;i<DOMAINS.length;i++)if(DOMAINS[i].id===id)return DOMAINS[i];return DOMAINS[0];}
  function esc(s){return(s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function rangeDays(){return range==="1m"?30:range==="3m"?90:365;}
  function diaryStreak(){
    if(!diary.length)return 0;
    var seen={},ds=[];diary.forEach(function(e){if(!seen[e.date]){seen[e.date]=1;ds.push(e.date);}});
    ds.sort().reverse();
    var st=0,cur=new Date(today());
    for(var i=0;i<ds.length;i++){var diff=Math.round((cur-new Date(ds[i]))/864e5);
      if(diff===0||diff===1){st++;cur=new Date(ds[i]);}else break;}
    return st;
  }

  function home(){
    var st=diaryStreak();
    var activeTasks=tasks.filter(function(t){return t.end>=today();}).length;
    var totalDiary=diary.length;
    var up=tasks.filter(function(t){return t.end>=today();}).sort(function(a,b){return a.start.localeCompare(b.start);}).slice(0,4);
    var upHtml=up.length?up.map(function(t){var d=dom(t.domain);var ongoing=t.start<=today();
      return'<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">'+
        '<span style="width:8px;height:8px;border-radius:50%;background:'+d.color+';flex:0 0 auto"></span>'+
        '<div style="flex:1;min-width:0"><div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</div>'+
        '<div style="font-size:10px;color:var(--muted)">'+fmt(t.start)+' \u2192 '+fmt(t.end)+'</div></div>'+
        '<span class="chip" style="'+(ongoing?'color:'+d.color+';border-color:'+d.color+'66':'')+'">'+(ongoing?"\u9032\u884c\u4e2d":"\u4e88\u5b9a")+'</span></div>';}).join("")
      :'<div class="empty">\u300c\u8a08\u753b\u300d\u30bf\u30d6\u3067\u53d6\u308a\u7d44\u307f\u9805\u76ee\u3092\u8ffd\u52a0\u3059\u308b\u3068\u3001\u3053\u3053\u306b\u8868\u793a\u3055\u308c\u307e\u3059</div>';
    var dstats=DOMAINS.map(function(d){return{d:d,n:tasks.filter(function(t){return t.domain===d.id&&t.end>=today();}).length};});
    var maxN=Math.max.apply(null,dstats.map(function(x){return x.n;}).concat([1]));
    var bal=dstats.map(function(x){return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">'+
      '<span style="font-size:16px">'+x.d.emoji+'</span>'+
      '<span style="width:36px;font-size:11px;color:var(--muted)">'+x.d.label+'</span>'+
      '<div style="flex:1;background:var(--border);border-radius:4px;height:6px;overflow:hidden">'+
      '<div style="width:'+Math.round(x.n/maxN*100)+'%;height:100%;background:'+x.d.color+';border-radius:4px"></div></div>'+
      '<span style="font-size:11px;color:var(--muted);width:20px;text-align:right">'+x.n+'</span></div>';}).join("");
    return '<div class="card" style="text-align:center;padding:22px 16px">'+
        '<div class="label">\u65e5\u8a18\u306e\u7d99\u7d9a</div>'+
        '<div class="ring-wrap"><div class="ring-outer"></div>'+
          '<div class="ring-mid" style="background:conic-gradient(var(--gold) '+Math.min(st*10,100)+'%,var(--card) 0)"></div>'+
          '<div class="ring-core"><div class="ring-num">'+st+'</div><div class="ring-lbl">\u65e5\u9023\u7d9a</div></div></div>'+
        '<div class="stat-row">'+
          '<div><div class="stat-num" style="color:var(--accent)">'+activeTasks+'</div><div class="stat-lbl">\u9032\u884c\u4e2d\u306e\u9805\u76ee</div></div>'+
          '<div><div class="stat-num" style="color:var(--green)">'+totalDiary+'</div><div class="stat-lbl">\u65e5\u8a18\u306e\u6570</div></div></div></div>'+
      '<div class="card"><div class="label">\u3053\u308c\u304b\u3089\u53d6\u308a\u7d44\u3080\u3053\u3068</div>'+upHtml+'</div>'+
      '<div class="card"><div class="label">\u9818\u57df\u30d0\u30e9\u30f3\u30b9\uff08\u9032\u884c\u4e2d\uff09</div>'+bal+'</div>'+
      '<div class="card"><div class="label">\u2601\uFE0F \u30af\u30e9\u30a6\u30c9\u540c\u671f</div><div id="syncBox">'+syncInner()+'</div></div>';
  }

  function plan(){
    var days=rangeDays(),start=today();
    var dayH=range==="1m"?14:range==="3m"?4.2:1.25;
    var trackH=Math.max(days*dayH,160);
    var axisW=52;            // roomier time axis
    var colW=52,colGap=14;   // wider bars, more breathing room
    var topPad=14;           // padding above first bar inside grid
    var sorted=tasks.filter(function(t){return t.end>=start;}).sort(function(a,b){return a.start.localeCompare(b.start)||a.domain.localeCompare(b.domain);});

    // grid lines + axis labels
    //   1m: 1日ごとに線（日付ラベル付き） / 3m: 1週間ごと / 1y: 月ごとのみ
    var lineHtml="",lblHtml="";
    var dayStep=(range==="1m")?1:(range==="3m")?7:9999; // 9999 = 月線のみ（dayStep線なし）
    for(var i=0;i<=days;i++){
      var d=new Date(start);d.setDate(d.getDate()+i);
      var dnum=d.getDate();
      var isMonth=(i===0||dnum===1);
      var top=topPad+i*dayH;
      if(isMonth){
        // i=0（今日）の位置は「今日」タグが示すので月ラベルは出さない（重なり防止）
        if(i!==0)lblHtml+='<div class="v-tick mon" style="top:'+top+'px"><span class="v-mnum">'+(d.getMonth()+1)+'</span><span class="v-msuf">\u6708</span></div>';
        lineHtml+='<div class="v-hline strong" style="top:'+top+'px"></div>';
      }else if(dayStep!==9999 && i%dayStep===0){
        lineHtml+='<div class="v-hline" style="top:'+top+'px"></div>';
        if(range==="1m"){
          lblHtml+='<div class="v-tick day" style="top:'+top+'px">'+dnum+'</div>';
        }else if(range==="3m"){
          // 月の線に近い週ラベルは重なるので省略
          var nd=new Date(d); nd.setDate(nd.getDate()+dayStep);   // 次の週ラベル位置
          var nearMonthStart = dnum<=4;                          // 月初の直後
          var nearMonthEnd = nd.getMonth()!==d.getMonth();       // 次の週で月が変わる＝月末付近
          if(!nearMonthStart && !nearMonthEnd)lblHtml+='<div class="v-tick wk" style="top:'+top+'px">'+dnum+'</div>';
        }
      }
    }

    // task columns — label sits as a rotated/clean tag above each bar's top
    var cols=sorted.length?sorted.map(function(t,idx){var d=dom(t.domain);
      var s=Math.max(dayDiff(start,t.start),0),e=Math.min(dayDiff(start,t.end),days);if(e<0)e=0;
      var top=topPad+s*dayH,h=Math.max((e-s)*dayH,26),clipped=t.start<start;
      var left=axisW+idx*(colW+colGap);
      var dur=dayDiff(t.start,t.end);
      return'<div class="v-bar row-tap" data-task="'+t.id+'" '+
        'style="left:'+left+'px;top:'+top+'px;width:'+colW+'px;height:'+h+'px;'+
        '--c:'+d.color+';background:linear-gradient(165deg,'+d.color+' 0%,'+d.color+'d9 100%);'+
        (clipped?"border-top-left-radius:3px;border-top-right-radius:3px":"")+'">'+
        '<span class="v-bar-emoji">'+d.emoji+'</span>'+
        '<span class="v-bar-tx">'+esc(t.title)+'</span>'+
        (h>52?'<span class="v-bar-dur">'+dur+'\u65e5</span>':'')+
        '</div>';}).join("")
      :"";

    var totalW=axisW+sorted.length*(colW+colGap)+8;
    var body=sorted.length?

  function runCoach(){
    var ta=document.getElementById("dtext");
    if(ta)dform.text=ta.value;
    if(!dform.text.trim()){coachState.error="\u5148\u306b\u4eca\u65e5\u306e\u65e5\u8a18\u3092\u5c11\u3057\u66f8\u3044\u3066\u304b\u3089\u8a66\u3057\u3066\u304f\u3060\u3055\u3044\u3002";refreshCoach();return;}
    var past=diary.filter(function(e){return e.id!==dform.id;}).sort(function(a,b){return b.date.localeCompare(a.date);})[0];
    var tagNames=(dform.taskIds||[]).map(function(id){var t=tasks.filter(function(x){return x.id===id;})[0];return t?t.title:"";}).filter(Boolean).join("\u3001");
    coachState.loading=true;coachState.error=null;refreshCoach();
    fetch(workerUrl,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({today:dform.text,past:past?past.text:"",tags:tagNames})})
      .then(function(res){return res.json().then(function(j){return{ok:res.ok,j:j};});})
      .then(function(o){coachState.loading=false;
        if(!o.ok){coachState.error=(o.j&&o.j.error)?o.j.error:"\u30a8\u30e9\u30fc\u304c\u767a\u751f\u3057\u307e\u3057\u305f";}
        else{coachState.result=o.j;}
        refreshCoach();})
      .catch(function(){coachState.loading=false;coachState.error="\u63a5\u7d9a\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002URL\u3092\u78ba\u8a8d\u3057\u3066\u304f\u3060\u3055\u3044\u3002";refreshCoach();});
  }

  }

  // ────────── Google Drive 同期ロジック ──────────
  function gReady(){ return typeof google!=="undefined" && google.accounts && google.accounts.oauth2; }

  function gInit(){
    if(gTokenClient||!gReady())return;
    gTokenClient=google.accounts.oauth2.initTokenClient({
      client_id:GCLIENT_ID, scope:GSCOPE,
      callback:function(resp){
        if(resp&&resp.access_token){ gToken=resp.access_token; if(gPending){var f=gPending;gPending=null;f();} }
        else { setSync("error","\u8a8d\u8a3c\u306b\u5931\u6557\u3057\u307e\u3057\u305f"); }
      }
    });
  }
  var gPending=null;
  function gAuth(then){
    if(!gReady()){ setSync("error","Google\u8aad\u307f\u8fbc\u307f\u4e2d\u3002\u6570\u79d2\u5f8c\u306b\u518d\u8a66\u884c\u3057\u3066\u304f\u3060\u3055\u3044"); return; }
    gInit(); gPending=then;
    gTokenClient.requestAccessToken({prompt: gToken?"":"consent"});
  }

  // appDataFolder 内の grow_data.json を探す
  function gFind(){
    return fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&pageSize=10",
      {headers:{Authorization:"Bearer "+gToken}})
      .then(function(r){return r.json();})
      .then(function(j){
        var f=(j.files||[]).filter(function(x){return x.name===GFILE;})[0];
        gFileId=f?f.id:null; return gFileId;
      });
  }

  function gSave(silent){
    if(!silent)setSync("busy","\u4fdd\u5b58\u4e2d\u2026");
    gAuth(function(){
      var payload={tasks:tasks,diary:diary,goals:goals,savedAt:new Date().toISOString()};
      gFind().then(function(id){
        var boundary="grow"+Date.now();
        var body="--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+
          JSON.stringify(id?{}:{name:GFILE,parents:["appDataFolder"]})+"\r\n"+
          "--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+
          JSON.stringify(payload)+"\r\n--"+boundary+"--";
        var url=id
          ? "https://www.googleapis.com/upload/drive/v3/files/"+id+"?uploadType=multipart"
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        return fetch(url,{method:id?"PATCH":"POST",
          headers:{Authorization:"Bearer "+gToken,"Content-Type":"multipart/related; boundary="+boundary},
          body:body});
      }).then(function(r){
        if(!r.ok)throw new Error();
        var n=new Date();
        setSync("ok",(silent?"\u81ea\u52d5\u4fdd\u5b58 \u00b7 ":"\u4fdd\u5b58\u3057\u307e\u3057\u305f \u00b7 ")+n.getHours()+":"+("0"+n.getMinutes()).slice(-2));
      }).catch(function(){ setSync("error","\u4fdd\u5b58\u306b\u5931\u6557\u3057\u307e\u3057\u305f"); });
    });
  }

  function gLoad(silent){
    if(!silent)setSync("busy","\u8aad\u307f\u8fbc\u307f\u4e2d\u2026");
    gAuth(function(){
      gFind().then(function(id){
        if(!id){ if(!silent)setSync("error","\u30af\u30e9\u30a6\u30c9\u306b\u30c7\u30fc\u30bf\u304c\u307e\u3060\u3042\u308a\u307e\u305b\u3093"); else setSync("idle",""); return null; }
        return fetch("https://www.googleapis.com/drive/v3/files/"+id+"?alt=media",
          {headers:{Authorization:"Bearer "+gToken}}).then(function(r){return r.json();});
      }).then(function(data){
        if(!data)return;
        if(data.tasks)tasks=data.tasks;
        if(data.diary)diary=data.diary;
        if(data.goals)goals=data.goals;
        localStorage.setItem(TKEY,JSON.stringify(tasks));
        localStorage.setItem(DKEY,JSON.stringify(diary));
        localStorage.setItem(GKEY,JSON.stringify(goals));
        setSync("ok",silent?"\u30af\u30e9\u30a6\u30c9\u3068\u540c\u671f\u6e08\u307f":"\u8aad\u307f\u8fbc\u307f\u307e\u3057\u305f");
        render();
      }).catch(function(){ if(!silent)setSync("error","\u8aad\u307f\u8fbc\u307f\u306b\u5931\u6557\u3057\u307e\u3057\u305f"); });
    });
  }

  // 変更後3秒でまとめて自動保存（デバウンス）
  function scheduleAutoSave(){
    if(!autoSync||!gToken)return;
    if(autoSaveTimer)clearTimeout(autoSaveTimer);
    setSync("busy","\u5909\u66f4\u3092\u4fdd\u5b58\u4e88\u5b9a\u2026");
    autoSaveTimer=setTimeout(function(){autoSaveTimer=null;gSave(true);},3000);
  }

  // 自動同期のオン/オフ切替
  function toggleAutoSync(){
    autoSync=!autoSync;
    localStorage.setItem(AKEY,autoSync?"1":"0");
    if(autoSync){ gLoad(false); }   // オンにした瞬間に一度クラウドから読込（ログイン）
    else { setSync("idle",""); }
    refreshSync();
  }

  // 起動時：自動同期が有効なら一度だけ静かに読込
  function autoSyncOnStart(){
    if(!autoSync)return;
    var tries=0;
    var iv=setInterval(function(){
      tries++;
      if(gReady()){ clearInterval(iv); gLoad(true); }
      else if(tries>20){ clearInterval(iv); }   // 約10秒待っても無理なら諦める
    },500);
  }

  function setSync(status,msg){
    syncState={status:status,msg:msg};
    refreshSync();
  }
  function refreshSync(){
    var box=document.getElementById("syncBox");
    if(box){box.innerHTML=syncInner();bindSync();}
  }

  function syncInner(){
    var st=syncState;
    var badge=st.status==="ok"?'<span style="color:var(--green)">\u2713 '+esc(st.msg)+'</span>'
      :st.status==="error"?'<span style="color:var(--red)">'+esc(st.msg)+'</span>'
      :st.status==="busy"?'<span style="color:var(--accent)">'+esc(st.msg)+'</span>'
      :autoSync?'<span>\u81ea\u52d5\u540c\u671f\u4e2d \u00b7 \u958b\u304f\u3068\u8aad\u8fbc\u30fb\u5909\u66f4\u3067\u4fdd\u5b58</span>'
      :'<span>iPhone\u30fbPC\u9593\u3067\u30c7\u30fc\u30bf\u3092\u540c\u671f\u3067\u304d\u307e\u3059</span>';
    return '<div class="sync-toggle-row">'+
        '<span class="sync-toggle-lbl">\u81ea\u52d5\u540c\u671f</span>'+
        '<button class="sync-toggle'+(autoSync?" on":"")+'" id="syncToggle"><span class="knob"></span></button>'+
      '</div>'+
      '<div class="sync-row">'+
        '<button class="sync-btn primary" id="syncSave">\u2601\uFE0F \u4fdd\u5b58</button>'+
        '<button class="sync-btn ghost" id="syncLoad">\u2B07\uFE0F \u8aad\u307f\u8fbc\u3080</button>'+
      '</div><div class="sync-status">'+badge+'</div>';
  }

  function bindSync(){
    var s=document.getElementById("syncSave");if(s)s.onclick=function(){gSave(false);};
    var l=document.getElementById("syncLoad");if(l)l.onclick=function(){gLoad(false);};
    var t=document.getElementById("syncToggle");if(t)t.onclick=toggleAutoSync;
  }

  function render(){
    var app=document.getElementById("app");
    app.innerHTML=
      '<div class="header"><div class="logo">GROW \u2726</div>'+
        '<div class="date">'+new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"long"})+'</div></div>'+
      '<div class="content">'+(tab==="home"?home():tab==="plan"?plan():diaryView())+'</div>'+
      (tab!=="home"?'<button class="fab" id="fab">\uFF0B</button>':"")+
      (showSheet==="task"?taskSheet():showSheet==="diary"?diarySheet():"")+
      '<div class="tabbar">'+
        [["home","\uD83C\uDFE0","\u30db\u30fc\u30e0"],["plan","\uD83D\uDCCA","\u8a08\u753b"],["diary","\uD83D\uDCD4","\u65e5\u8a18"]].map(function(x){
          return'<button class="tab '+(tab===x[0]?"on":"")+'" data-tab="'+x[0]+'"><span class="ic">'+x[1]+'</span>'+x[2]+'</button>';}).join("")+
      '</div>';
    bind();
  }

  function bind(){
    bindSync();
    var tb=document.querySelectorAll("[data-tab]");tb.forEach(function(b){b.onclick=function(){tab=b.dataset.tab;showSheet=null;render();};});
    document.querySelectorAll("[data-range]").forEach(function(b){b.onclick=function(){range=b.dataset.range;render();};});
    var fab=document.getElementById("fab");
    if(fab)fab.onclick=function(){if(tab==="plan"){tform=blankTask();showSheet="task";}else if(tab==="diary"){dform=blankDiary();compareDate=null;coachState={loading:false,result:null,error:null};showSheet="diary";}render();};
    document.querySelectorAll("[data-task]").forEach(function(b){b.onclick=function(){
      var t=tasks.filter(function(x){return x.id==b.dataset.task;})[0];if(t){tform=JSON.parse(JSON.stringify(t));showSheet="task";render();}};});
    document.querySelectorAll("[data-diary]").forEach(function(b){b.onclick=function(){
      var e=diary.filter(function(x){return x.id==b.dataset.diary;})[0];if(e){dform=JSON.parse(JSON.stringify(e));if(!dform.taskIds)dform.taskIds=[];compareDate=null;coachState={loading:false,result:null,error:null};showSheet="diary";render();}};});

    var modal=document.getElementById("modal");
    if(modal){
      modal.onclick=function(e){if(e.target.id==="modal"){showSheet=null;render();}};
      document.querySelectorAll("[data-dom]").forEach(function(b){b.onclick=function(){tform.domain=b.dataset.dom;render();};});
      var tt=document.getElementById("ttitle");if(tt)tt.oninput=function(){tform.title=tt.value;};
      var td=document.getElementById("tdesc");if(td)td.oninput=function(){tform.desc=td.value;};
      var ts=document.getElementById("tstart");if(ts)ts.onchange=function(){tform.start=ts.value;};
      var te=document.getElementById("tend");if(te)te.onchange=function(){tform.end=te.value;};
      var sT=document.getElementById("saveTask");
      if(sT)sT.onclick=function(){if(!tform.title.trim())return;if(tform.end<tform.start)tform.end=tform.start;
        if(tform.id){tasks=tasks.map(function(x){return x.id===tform.id?JSON.parse(JSON.stringify(tform)):x;});}
        else{tform.id=Date.now();tasks.push(JSON.parse(JSON.stringify(tform)));}
        showSheet=null;save();render();};
      var dT=document.getElementById("delTask");
      if(dT)dT.onclick=function(){tasks=tasks.filter(function(x){return x.id!==tform.id;});showSheet=null;save();render();};
      document.querySelectorAll("[data-mood]").forEach(function(b){b.onclick=function(){dform.mood=+b.dataset.mood;render();};});
      document.querySelectorAll("[data-tag]").forEach(function(b){b.onclick=function(){
        if(!dform.taskIds)dform.taskIds=[];
        var id=+b.dataset.tag,i=dform.taskIds.indexOf(id);
        if(i>=0)dform.taskIds.splice(i,1);else dform.taskIds.push(id);
        render();};});
      var cs=document.getElementById("cmpsel");if(cs)cs.onchange=function(){compareDate=cs.value;render();};
      var dd=document.getElementById("ddate");if(dd)dd.onchange=function(){dform.date=dd.value;};
      var dx=document.getElementById("dtext");if(dx)dx.oninput=function(){dform.text=dx.value;};
      bindCoach();
      var sD=document.getElementById("saveDiary");
      if(sD)sD.onclick=function(){if(!dform.text.trim())return;
        if(dform.id){diary=diary.map(function(x){return x.id===dform.id?JSON.parse(JSON.stringify(dform)):x;});}
        else{dform.id=Date.now();diary.push(JSON.parse(JSON.stringify(dform)));}
        showSheet=null;save();render();};
      var dD=document.getElementById("delDiary");
      if(dD)dD.onclick=function(){diary=diary.filter(function(x){return x.id!==dform.id;});showSheet=null;save();render();};
    }
  }

  render();
  autoSyncOnStart();
})();
</script>
</body>
</html>
